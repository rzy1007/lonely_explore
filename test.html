<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Test</title>
<style>
  body { background: #000; color: #fff; font-family: sans-serif; }
  #box { width: 300px; height: 300px; margin: 100px auto; background: red; display: flex; align-items: center; justify-content: center; font-size: 24px; }
</style>
</head>
<body>
<div id="box">如果你看到这个红块，HTML/CSS 正常工作</div>
<script type="module">
  console.log('Module JS executed!');
  document.getElementById('box').textContent += ' | JS 正常执行!';

  // Test Three.js
  try {
    const THREE = await import('three');
    document.getElementById('box').textContent += ' | Three.js 加载成功! v' + THREE.REVISION;
  } catch(e) {
    document.getElementById('box').textContent += ' | Three.js 加载失败: ' + e.message;
  }
</script>
</body>
</html>

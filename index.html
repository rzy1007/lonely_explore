<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>孤独探索 - 天体宇宙</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:#fff;user-select:none;-webkit-user-select:none}
#app{width:100%;height:100%;position:relative}
#status{position:fixed;top:10px;left:10px;z-index:999;color:#0f0;font-size:12px;font-family:monospace;pointer-events:none;opacity:0.6}
#three-canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
/* Splash */
#splash-wrap{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#1a0a2e 0%,#0a0510 50%,#000 100%);cursor:pointer}
#splash-wrap h1{font-size:clamp(2.5rem,6vw,5rem);font-weight:700;letter-spacing:.3em;background:linear-gradient(135deg,#667eea,#764ba2,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#splash-wrap p{margin-top:1rem;color:rgba(255,255,255,.6);font-size:clamp(.9rem,1.5vw,1.2rem);letter-spacing:.2em}
/* Sidebar */
#sidebar{position:fixed;left:0;top:0;width:280px;height:100%;z-index:10;background:rgba(10,10,30,.9);backdrop-filter:blur(10px);border-right:1px solid rgba(255,255,255,.08);transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
#sidebar.open{transform:translateX(0)}
#btn-menu{position:fixed;left:10px;top:10px;z-index:11;width:42px;height:42px;border:1px solid rgba(255,255,255,.18);border-radius:50%;background:rgba(10,10,30,.6);backdrop-filter:blur(5px);color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
#btn-menu:hover{background:rgba(100,100,200,.5)}
#search-box{width:calc(100% - 1.5rem);margin:.75rem;padding:.55rem .8rem;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.07);color:#fff;font-size:.9rem;outline:none}
#search-box::placeholder{color:rgba(255,255,255,.35)}
#search-box:focus{border-color:rgba(120,140,255,.5)}
#celestial-tree{flex:1;overflow-y:auto;padding:0 .5rem 1rem}
.tree-cat{padding:.6rem .7rem .2rem;font-size:.75rem;color:rgba(180,180,220,.8);font-weight:700;letter-spacing:.08em;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:.15rem}
.tree-node{padding:.45rem .7rem;cursor:pointer;border-radius:6px;transition:background .2s;font-size:.85rem;color:rgba(255,255,255,.75)}
.tree-node:hover{background:rgba(255,255,255,.08)}
.tree-node.sel{background:rgba(100,140,255,.25);color:#fff}
.child{padding-left:1.8rem!important;font-size:.78rem!important}
/* Info Panel */
#info-panel{position:fixed;right:16px;top:50%;transform:translateY(-50%) translateX(calc(100% + 30px));width:300px;max-height:65vh;z-index:10;background:rgba(10,10,30,.88);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:1.2rem;transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto}
#info-panel.show{transform:translateY(-50%) translateX(0)}
#info-panel h2{font-size:1.3rem;margin-bottom:.15rem}
#info-panel .en{font-size:.8rem;color:rgba(255,255,255,.45);margin-bottom:.8rem}
#info-panel .row{display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.8rem}
#info-panel .row .lbl{color:rgba(255,255,255,.45)}
#info-panel .desc{margin-top:.8rem;font-size:.8rem;line-height:1.55;color:rgba(255,255,255,.7)}
#btn-immersive{display:block;width:100%;margin-top:1rem;padding:.55rem;border:1px solid rgba(180,140,255,.4);border-radius:8px;background:linear-gradient(135deg,rgba(102,126,234,.25),rgba(118,75,162,.25));color:#fff;font-size:.9rem;cursor:pointer;text-align:center;transition:all .3s}
#btn-immersive:hover{background:linear-gradient(135deg,rgba(102,126,234,.5),rgba(118,75,162,.5));border-color:rgba(200,160,255,.7)}
#btn-close-info{position:absolute;top:8px;right:8px;width:28px;height:28px;border:none;background:rgba(255,255,255,.08);border-radius:50%;color:#fff;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
#btn-close-info:hover{background:rgba(255,255,255,.18)}
/* Scale bar */
#scale-bar{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:2px;background:rgba(10,10,30,.82);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:4px 6px}
.scale-item{display:flex;flex-direction:column;align-items:center;padding:6px 12px;cursor:pointer;border-radius:22px;transition:all .3s;color:rgba(255,255,255,.45);font-size:.7rem;min-width:55px}
.scale-item:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.scale-item.act{color:#fff;background:rgba(100,140,255,.28)}
.scale-icon{font-size:1.1rem;margin-bottom:1px}
/* Immersive */
#imm-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;background:#000;display:none}
#imm-overlay.act{display:flex}
#btn-exit-imm{position:fixed;top:16px;right:16px;z-index:52;padding:.5rem 1rem;border:1px solid rgba(255,255,255,.18);border-radius:18px;background:rgba(0,0,0,.55);color:#fff;cursor:pointer;font-size:.85rem;transition:all .3s}
#btn-exit-imm:hover{background:rgba(255,255,255,.12)}
#imm-hint{position:fixed;bottom:35px;left:50%;transform:translateX(-50%);z-index:51;padding:.6rem 1.2rem;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.12);border-radius:18px;color:rgba(255,255,255,.65);font-size:.8rem;display:none}
#imm-hint.show{display:block}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
/* Focus indicator */
#focus-indicator{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:10;padding:.4rem 1rem;background:rgba(100,140,255,.2);border:1px solid rgba(100,140,255,.3);border-radius:16px;font-size:.75rem;color:rgba(255,255,255,.7);pointer-events:none;opacity:0;transition:opacity .3s}
#focus-indicator.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div id="status">loading...</div>
  <div id="splash-wrap"><h1>孤独探索</h1><p>点击任意位置开始探索宇宙</p></div>

    <div id="celestial-tree"></div>
  </div>
  <div id="info-panel">
    <button id="btn-close-info">✕</button>

  </div>
  <div id="scale-bar"></div>
  <div id="focus-indicator"></div>
  <div id="imm-overlay">
    <button id="btn-exit-imm">✕ 退出沉浸模式</button>

  </div>
</div>

<script type="module">
import * as THREE from 'three';

const $ = (s) => document.getElementById(s);
const statusEl = $('status');

log('Loading...');

// ═══════════════════ DATA ═══════════════════
const SCALES = [

const bodies = [
  { id:'sun',name:'太阳',en:'Sun',type:'G型主序星',scale:0,d:'1,392,700 km',mass:'1.989×10³⁰ kg',temp:'5,500°C',dist:'太阳系中心',desc:'太阳是太阳系的中心天体，一颗G型主序星。它通过核聚变将氢转化为氦，占太阳系总质量的99.86%。',color:0xffdd44,size:8,pos:[0,0,0],imm:true },
  { id:'mercury',name:'水星',en:'Mercury',type:'类地行星',scale:0,d:'4,879 km',mass:'3.301×10²³ kg',temp:'-173~427°C',dist:'距太阳0.39 AU',desc:'太阳系中最小的行星，几乎没有大气层，表面布满了撞击坑。',color:0xb0a090,size:.8,pos:[15,0,0],parent:'sun',imm:true },
  { id:'venus',name:'金星',en:'Venus',type:'类地行星',scale:0,d:'12,104 km',mass:'4.867×10²⁴ kg',temp:'462°C',dist:'距太阳0.72 AU',desc:'太阳系中最亮的行星，被称为启明星。浓密的CO₂大气造成极强的温室效应。',color:0xe8cda0,size:1.9,pos:[25,0,0],parent:'sun',imm:true },
  { id:'earth',name:'地球',en:'Earth',type:'类地行星',scale:0,d:'12,742 km',mass:'5.972×10²⁴ kg',temp:'15°C',dist:'距太阳1 AU',desc:'太阳系中唯一已知存在生命的天体。拥有液态水和适中的温度。',color:0x4488cc,size:2,pos:[35,0,0],parent:'sun',imm:true },
  { id:'mars',name:'火星',en:'Mars',type:'类地行星',scale:0,d:'6,779 km',mass:'6.417×10²³ kg',temp:'-63°C',dist:'距太阳1.52 AU',desc:'表面氧化铁呈红色，拥有太阳系最高山奥林帕斯山(21.9km)。',color:0xcc5533,size:1.7,pos:[50,0,0],parent:'sun',imm:true },
  { id:'jupiter',name:'木星',en:'Jupiter',type:'气态巨行星',scale:0,d:'139,820 km',mass:'1.898×10²⁷ kg',temp:'-110°C',dist:'距太阳5.2 AU',desc:'太阳系中最大的行星，大红斑是持续数百年的巨大风暴。',color:0xddaa77,size:5,pos:[70,0,0],parent:'sun',imm:true },
  { id:'saturn',name:'土星',en:'Saturn',type:'气态巨行星',scale:0,d:'116,460 km',mass:'5.683×10²⁶ kg',temp:'-140°C',dist:'距太阳9.54 AU',desc:'以其壮观的环系统闻名，主要由冰碎片和岩石碎片组成。',color:0xeeddaa,size:4.5,pos:[90,0,0],parent:'sun',rings:true,imm:true },
  { id:'uranus',name:'天王星',en:'Uranus',type:'冰巨行星',scale:0,d:'50,724 km',temp:'-195°C',dist:'距太阳19.2 AU',desc:'自转轴几乎平躺(倾角98°)，呈淡青色。',color:0x99ccdd,size:3.8,pos:[110,0,0],parent:'sun',imm:true },
  { id:'neptune',name:'海王星',en:'Neptune',type:'冰巨行星',scale:0,d:'49,244 km',temp:'-200°C',dist:'距太阳30.05 AU',desc:'太阳系最远行星，风速可达2100km/h，呈现深蓝色。',color:0x3355cc,size:3.6,pos:[130,0,0],parent:'sun',imm:true },
  { id:'pluto',name:'冥王星',en:'Pluto',type:'矮行星',scale:0,d:'2,377 km',temp:'-230°C',dist:'距太阳39.5 AU',desc:'2006年被重新分类为矮行星。拥有心形冰原——汤博区。',color:0xccbbaa,size:.7,pos:[155,0,0],parent:'sun',imm:true },
  { id:'moon',name:'月球',en:'Moon',type:'天然卫星',scale:0,d:'3,474 km',temp:'-173~127°C',dist:'距地球38.4万km',desc:'地球唯一的天然卫星，人类唯一踏足过的地外天体。',color:0xcccccc,size:.55,pos:[36.5,2,0],parent:'earth',imm:true },
  { id:'proxima',name:'比邻星',en:'Proxima Centauri',type:'红矮星',scale:1,d:'~200,000 km',temp:'2,670°C',dist:'4.246光年',desc:'距离太阳最近的恒星。2016年发现宜居带类地行星比邻星b。',color:0xff6644,size:3,pos:[-100,-60,-80],imm:true },
  { id:'sirius',name:'天狼星A',en:'Sirius A',type:'A型主序星',scale:1,d:'~2,400,000 km',temp:'9,940°C',dist:'8.6光年',desc:'夜空中最亮的恒星，位于大犬座。古代埃及人据此预测尼罗河泛滥。',color:0xffffff,size:5,pos:[-60,40,-90],imm:true },
  { id:'vega',name:'织女星',en:'Vega',type:'A型主序星',scale:1,temp:'9,600°C',dist:'25光年',desc:'天琴座最亮星，北半球夏夜最明亮恒星之一。在中国传说中与牛郎星隔银河相望。',color:0xaaccff,size:4.8,pos:[40,80,-70],imm:true },
  { id:'betelgeuse',name:'参宿四',en:'Betelgeuse',type:'红超巨星',scale:1,d:'~12亿 km',temp:'3,500°C',dist:'548光年',desc:'猎户座红超巨星，如果放在太阳位置，表面将延伸到木星轨道外。',color:0xff4422,size:6.5,pos:[-20,100,-60],imm:true },
  { id:'polaris',name:'北极星',en:'Polaris',type:'F型超巨星',scale:1,temp:'6,015°C',dist:'433光年',desc:'几乎正对地球自转轴，是导航的重要参照。约13000年后织女星将成为新的北极星。',color:0xffffee,size:5.2,pos:[30,130,-50],imm:true },
  { id:'rigel',name:'参宿七',en:'Rigel',type:'蓝超巨星',scale:1,temp:'12,100°C',dist:'864光年',desc:'猎户座最亮恒星，亮度约为太阳的12万倍。',color:0xaaaaff,size:5.5,pos:[-30,110,-60] },
  { id:'sgra',name:'人马座A*',en:'Sagittarius A*',type:'超大质量黑洞',scale:2,d:'~1200万 km',mass:'410万 M☉',dist:'26,000光年',desc:'银河系中心超大质量黑洞。2022年EHT拍摄到其光环图像。',color:0x000000,size:6,pos:[0,0,-300],imm:true,bh:true },
  { id:'m42',name:'猎户座大星云',en:'Orion Nebula M42',type:'发射星云',scale:2,d:'~24光年',dist:'1,344光年',desc:'夜空中最亮的星云之一，是活跃的恒星形成区。',color:0xff66aa,size:4,pos:[-80,40,-200],imm:true,neb:true },
  { id:'m1',name:'蟹状星云',en:'Crab Nebula M1',type:'超新星遗迹',scale:2,d:'~11光年',dist:'6,500光年',desc:'1054年超新星爆发遗迹，中国古代详细记录了这次"客星"现象。',color:0x8844cc,size:3.5,pos:[-60,-20,-250],imm:true,neb:true },
  { id:'pleiades',name:'昴星团',en:'Pleiades M45',type:'疏散星团',scale:2,d:'~16光年',dist:'444光年',desc:'位于金牛座，最著名的疏散星团之一。中国二十八宿之一。',color:0xaaccff,size:5,pos:[50,30,-180],imm:true,clust:true },
  { id:'andromeda',name:'仙女座星系',en:'Andromeda M31',type:'旋涡星系',scale:3,d:'~22万光年',mass:'1.23×10¹² M☉',dist:'254万光年',desc:'本星系群最大星系，正以110km/s接近银河系，约45亿年后碰撞合并。',color:0xddccaa,size:7,pos:[0,0,-600],imm:true,gal:true },
  { id:'triangulum',name:'三角座星系',en:'Triangulum M33',type:'旋涡星系',scale:3,d:'~6万光年',dist:'273万光年',desc:'本星系群第三大星系，仙女座星系的卫星星系。',color:0xccddff,size:4.5,pos:[200,100,-650],gal:true },
  { id:'lmc',name:'大麦哲伦云',en:'LMC',type:'不规则矮星系',scale:3,d:'~14,000光年',dist:'16.3万光年',desc:'银河系最大的卫星星系。1987年在此观测到著名超新星SN 1987A。',color:0xbbccff,size:4,pos:[250,-150,-550],gal:true },
  { id:'virgo-sc',name:'室女座超星系团',en:'Virgo Supercluster',type:'超星系团',scale:4,d:'~1.1亿光年',desc:'包含本星系群在内约100个星系群和星系团，是拉尼亚凯亚超星系团的一部分。',color:0x554488,size:20,pos:[0,0,-1200] },
  { id:'laniakea',name:'拉尼亚凯亚超星系团',en:'Laniakea Supercluster',type:'超星系团',scale:4,d:'~5.2亿光年',desc:'2014年定义，夏威夷语意为"无尽的天堂"。引力中心为"巨引源"。',color:0x443366,size:30,pos:[0,0,-1500] },
  { id:'cmb',name:'宇宙微波背景',en:'CMB',type:'宇宙辐射',scale:4,temp:'2.725K',dist:'大爆炸后38万年',desc:'大爆炸遗留的热辐射，均匀充满宇宙。1965年发现，为宇宙大爆炸理论提供了最有力证据。',color:0x332244,size:50,pos:[0,0,-2000] },
];

// ═══════════════════ STATE ═══════════════════
let currentScale = 0, selectedId = null, sidebarOpen = false, isImmersive = false;
let pivot = new THREE.Vector3(0,0,0);
let spherical = new THREE.Spherical(60, Math.PI/3, 0);
let dragging = false, dragMoved = false, prevMouse = {x:0,y:0};
let cameraGoal = new THREE.Vector3(), lookGoal = new THREE.Vector3();
let bgOpacity = 0, targetBgOpacity = 1, prevScale = 0, prevSelectedId = null;

// ═══════════════════ THREE.JS SETUP ═══════════════════
log('Init Three.js...');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000011, 0.000015);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 10000);
camera.position.set(0,30,60);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
$('app').appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x222244,1.5));
const sunLight = new THREE.PointLight(0xffffff,200,300);
scene.add(sunLight);

// ═══════════════════ STARFIELD ═══════════════════
const starCount = 5000;
const starPos = new Float32Array(starCount*3);
const starCol = new Float32Array(starCount*3);
for (let i=0;i<starCount;i++) {
  const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
  const r = 800+Math.random()*400;
  starPos[i*3]=r*Math.sin(ph)*Math.cos(th);
  starPos[i*3+1]=r*Math.sin(ph)*Math.sin(th);
  starPos[i*3+2]=r*Math.cos(ph);
  const c=Math.random();
  if(c<.6){starCol[i*3]=.85+Math.random()*.15;starCol[i*3+1]=.85+Math.random()*.15;starCol[i*3+2]=.9+Math.random()*.1}
  else if(c<.8){starCol[i*3]=.5+Math.random()*.3;starCol[i*3+1]=.6+Math.random()*.3;starCol[i*3+2]=.9+Math.random()*.1}
  else if(c<.9){starCol[i*3]=.9+Math.random()*.1;starCol[i*3+1]=.7+Math.random()*.2;starCol[i*3+2]=.4+Math.random()*.3}
  else{starCol[i*3]=.7+Math.random()*.3;starCol[i*3+1]=.4+Math.random()*.3;starCol[i*3+2]=.3+Math.random()*.3}
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
starGeo.setAttribute('color',new THREE.BufferAttribute(starCol,3));
const stars = new THREE.Points(starGeo,new THREE.PointsMaterial({size:.8,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true}));
stars.name='starfield';
scene.add(stars);

// ═══════════════════ CELESTIAL BODIES ═══════════════════
const meshes = new Map();
const selectableMeshes = [];

function makeTex(color,type) {
  const c=document.createElement('canvas');c.width=256;c.height=256;
  const ctx=c.getContext('2d');
  const col='#'+color.toString(16).padStart(6,'0');
  ctx.fillStyle=col;ctx.fillRect(0,0,256,256);
  if(type==='gas'){for(let y=0;y<256;y++){ctx.fillStyle=`rgba(255,255,255,${.03+Math.random()*.06})`;ctx.fillRect(0,y,256,2+Math.random()*8)}for(let i=0;i<6;i++){const y=256/7*(i+1);ctx.fillStyle=`rgba(255,255,255,${.1+Math.random()*.12})`;ctx.fillRect(0,y-3,256,6+Math.random()*12)}}

function initBackgrounds() {
  bgGroups[0]=createBgScale0();
  bgGroups[1]=createBgScale1();
  bgGroups[2]=createBgScale2();
  bgGroups[3]=createBgScale3();
  bgGroups[4]=createBgScale4();
  Object.values(bgGroups).forEach(g=>{g.visible=true;scene.add(g);g.children.forEach(c=>{if(c.material){c.material.transparent=true;c.material.opacity=c.material.opacity||.3}})});
  setBgOpacity(0,0);
  setBgOpacity(currentScale,1);
  activeBgGroup=bgGroups[currentScale];
}
initBackgrounds();

function setBgOpacity(scale,opacity) {
  const g=bgGroups[scale];
  if(!g)return;
  g.children.forEach(c=>{if(c.material&&c.material.transparent)c.material.opacity=Math.max(0,Math.min(1,opacity*(c.material.userData?.baseOpacity??1)))});
}

function fadeBackground(fromScale,toScale) {
  if(fromScale===toScale)return;
  prevBgGroup=bgGroups[fromScale];
  activeBgGroup=bgGroups[toScale];
  bgOpacity=1;targetBgOpacity=0;
  // Quick fade: old bg out, new bg in
  const oldG=bgGroups[fromScale],newG=bgGroups[toScale];
  if(oldG)oldG.children.forEach(c=>{if(c.material)c.material.userData={...c.material.userData,baseOpacity:c.material.opacity}});
  if(newG)newG.children.forEach(c=>{if(c.material)c.material.opacity=0});
}

// ═══════════════════ CAMERA & ORBIT CONTROLS ═══════════════════
function updateCamFromSpherical() {
  const pos=new THREE.Vector3().setFromSpherical(spherical).add(pivot);
  camera.position.copy(pos);
  camera.lookAt(pivot);
  cameraGoal.copy(pos);
  lookGoal.copy(pivot);
}
updateCamFromSpherical();

function setPivot(newPivot,keepZoom=true) {
  const offset=camera.position.clone().sub(newPivot);
  const s=new THREE.Spherical().setFromVector3(offset);
  if(keepZoom){/* keep current radius */}else{s.radius=Math.min(50,s.radius)}
  spherical.copy(s);
  pivot.copy(newPivot);
  updateCamFromSpherical();
}

// Mouse drag rotation - maintains zoom
renderer.domElement.addEventListener('pointerdown',e=>{
  dragging=true;dragMoved=false;
  prevMouse={x:e.clientX,y:e.clientY};
});
window.addEventListener('pointerup',()=>{dragging=false});
window.addEventListener('pointermove',e=>{
  if(!dragging||isImmersive)return;
  const dx=e.clientX-prevMouse.x,dy=e.clientY-prevMouse.y;
  if(Math.abs(dx)>1||Math.abs(dy)>1)dragMoved=true;
  spherical.theta-=dx*.005;
  spherical.phi-=dy*.005;
  spherical.phi=Math.max(.05,Math.min(Math.PI*.48,spherical.phi));
  prevMouse={x:e.clientX,y:e.clientY};
  updateCamFromSpherical();
});
// Zoom
renderer.domElement.addEventListener('wheel',e=>{
  e.preventDefault();
  spherical.radius*=1+e.deltaY*.001;
  spherical.radius=Math.max(3,Math.min(800,spherical.radius));
  updateCamFromSpherical();
  const r=spherical.radius;
  let ns=r<40?0:r<150?1:r<300?2:r<500?3:4;
  if(ns!==currentScale)setScale(ns);
},{passive:false});

// ═══════════════════ RAYCASTER CLICK SELECTION ═══════════════════
const raycaster=new THREE.Raycaster();
raycaster.params.Points.threshold=1.5;
raycaster.params.Sprite={threshold:2};

renderer.domElement.addEventListener('click',e=>{
  if(dragMoved||isImmersive)return;
  const mouse=new THREE.Vector2(
    (e.clientX/innerWidth)*2-1,
    -(e.clientY/innerHeight)*2+1
  );
  raycaster.setFromCamera(mouse,camera);
  const intersects=raycaster.intersectObjects(selectableMeshes,true);
  if(intersects.length>0){
    let obj=intersects[0].object;
    while(obj&&!obj.userData.bodyId)obj=obj.parent;
    if(obj&&obj.userData.bodyId){
      const bid=obj.userData.bodyId;
      if(bid!==selectedId||pivot.distanceTo(new THREE.Vector3(...bodies.find(b=>b.id===bid).pos))>.1){
        selectBody(bid);
      }
    }
  }
});

// ═══════════════════ BODY SELECTION ═══════════════════
function selectBody(id) {
  const b=bodies.find(x=>x.id===id);if(!b)return;
  const prevScale=currentScale,prevId=selectedId;
  selectedId=id;
  // Set pivot to this body
  setPivot(new THREE.Vector3(...b.pos),false);
  // Switch to body's scale
  if(b.scale!==currentScale){currentScale=b.scale;updateScaleBar()}
  // Update background
  if(b.scale!==prevScale||b.id!==prevId)fadeBackground(prevScale,b.scale);
  // Update UI
  updateInfoPanel();updateSidebar();
  // Show focus indicator
  const fi=$('focus-indicator');
  fi.textContent='当前聚焦: '+b.name+' ('+b.en+') · 点击其他天体切换';
  fi.classList.add('show');
  setTimeout(()=>fi.classList.remove('show'),2500);
}

function deselectBody() {
  selectedId=null;
  updateInfoPanel();updateSidebar();
}

// ═══════════════════ SCALE MANAGEMENT ═══════════════════
function setScale(s) {
  if(s===currentScale)return;
  const prev=currentScale;
  currentScale=s;
  if(selectedId){const b=bodies.find(x=>x.id===selectedId);if(b&&b.scale!==s){deselectBody()}}
  updateScaleBar();updateSidebar();
  fadeBackground(prev,s);
}

function flyScale(s) {
  const cfg={0:{p:[0,30,60],l:[0,0,0]},1:{p:[0,30,200],l:[0,0,-80]},2:{p:[0,30,350],l:[0,0,-200]},3:{p:[0,50,700],l:[150,0,-550]},4:{p:[0,80,1600],l:[0,0,-1200]}};
  const c=cfg[s]||cfg[0];
  pivot.set(...c.l);
  const off=new THREE.Vector3(...c.p).sub(pivot);
  spherical.setFromVector3(off);
  if(s===0)spherical.radius=60;
  updateCamFromSpherical();
}

// Scale bar
const scaleBar=$('scale-bar');
SCALES.forEach(s=>{const item=document.createElement('div');item.className='scale-item';item.dataset.s=s.id;item.innerHTML=`<span class="scale-icon">${s.icon}</span><span>${s.name}</span>`;item.addEventListener('click',()=>{setScale(s.id);flyScale(s.id)});scaleBar.appendChild(item)});
function updateScaleBar(){scaleBar.querySelectorAll('.scale-item').forEach(el=>el.classList.toggle('act',+el.dataset.s===currentScale))}

// Init UI
updateSidebar();updateScaleBar();scaleBar.querySelector('[data-s="0"]')?.classList.add('act');

// ═══════════════════ RENDER LOOP ═══════════════════
const clock=new THREE.Clock();

function render() {
  requestAnimationFrame(render);
  const dt=Math.min(clock.getDelta(),.1);

  // Smooth camera (for flyScale animations)
  if(camera.position.distanceTo(cameraGoal)>.1){
    camera.position.lerp(cameraGoal,.08);
    camera.lookAt(lookGoal);
  }

  // Background fade transition
  if(activeBgGroup&&prevBgGroup){
    bgOpacity=Math.max(0,bgOpacity-dt*2);
    setBgOpacity(currentScale,1-bgOpacity);
    if(prevBgGroup){
      // Find which scale the prev group belongs to
      const prevScale=Object.entries(bgGroups).find(([k,v])=>v===prevBgGroup);
      if(prevScale)setBgOpacity(+prevScale[0],bgOpacity);
    }
    if(bgOpacity<=0){if(prevBgGroup)prevBgGroup.children.forEach(c=>{if(c.material)c.material.opacity=0});prevBgGroup=null}
  }

  // Starfield subtle rotation
  stars.rotation.y+=.00008;
  stars.rotation.x+=.00003;

  // Animate background particles
  if(activeBgGroup){
    activeBgGroup.rotation.y+=.0002;
    activeBgGroup.rotation.x+=.0001;
  }

  // Rotate bodies
  if(isImmersive&&selectedId){const m=meshes.get(selectedId);if(m)m.rotation.y+=.005}
  // Always slowly rotate sun
  const sunMesh=meshes.get('sun');if(sunMesh)sunMesh.rotation.y+=.002;

  // Slow spin for planets
  meshes.forEach((m,id)=>{
    const b=bodies.find(x=>x.id===id);
    if(!b)return;
    if(id==='sun')return;
    if(b.type?.includes('恒星')||b.type?.includes('主序星')){
      m.rotation.y+=.0005;
    }else if(!b.neb&&!b.clust&&!b.gal&&!b.bh){
      m.rotation.y+=.003;
    }
    // Pulsate black holes
    if(b.bh){m.children.forEach(c=>{if(c.material&&c.material.uniforms&&c.material.uniforms.uT)c.material.uniforms.uT.value+=dt})}
  });

  // Move sunLight with camera for consistent lighting
  sunLight.position.copy(camera.position).add(new THREE.Vector3(0,0,0));

  renderer.render(scene,camera);
}

log('Starting render...');
render();
log('Ready! Click stars or use sidebar.');
</script>
</body>
</html>

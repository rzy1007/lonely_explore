  if(body.id==='sun'){
    const grd=ctx.createRadialGradient(w/2,h/2,w*.05,w/2,h/2,w*.55);
    grd.addColorStop(0,'#ffffcc');grd.addColorStop(.15,'#ffdd66');grd.addColorStop(.35,'#ff9900');grd.addColorStop(.6,'#ee6600');grd.addColorStop(.85,'#cc4400');grd.addColorStop(1,'#993300');

    for(let i=0;i<12;i++){const sx=R()*w, sy=R()*h, sr=3+R()*15;ctx.fillStyle=`rgba(80,20,0,${.3+R()*.4})`;ctx.beginPath();ctx.arc(sx,sy,sr,0,P*2);ctx.fill();ctx.fillStyle=`rgba(50,10,0,${.5+R()*.3})`;ctx.beginPath();ctx.arc(sx,sy,sr*.5,0,P*2);ctx.fill()}
  }
  // ---- EARTH ----
  else if(body.earth){

    const oceanGrd=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w*.55);
    oceanGrd.addColorStop(0,'#3366cc');oceanGrd.addColorStop(.4,'#2244aa');oceanGrd.addColorStop(1,'#112266');
    ctx.fillStyle=oceanGrd;ctx.fillRect(0,0,w,h);
    // Continents (using noise-like shapes)
    const continents=[{x:.25,y:.3,rx:80,ry:100},{x:.45,y:.25,rx:90,ry:70},{x:.55,y:.45,rx:60,ry:80},{x:.7,y:.35,rx:50,ry:60},{x:.35,y:.6,rx:70,ry:50},{x:.6,y:.65,rx:40,ry:55},{x:.2,y:.5,rx:50,ry:40},{x:.75,y:.55,rx:30,ry:45}];
    continents.forEach(ct=>{ctx.save();ctx.beginPath();ctx.ellipse(ct.x*w,ct.y*h,ct.rx,ct.ry,R()*.5,0,P*2);ctx.clip();
      const lgrd=ctx.createLinearGradient(ct.x*w-ct.rx,ct.y*h,ct.x*w+ct.rx,ct.y*h);
      lgrd.addColorStop(0,'#2d5a1e');lgrd.addColorStop(.3,'#4a7c2e');lgrd.addColorStop(.6,'#6b8c3e');lgrd.addColorStop(1,'#3d6b2a');
      ctx.fillStyle=lgrd;ctx.fillRect(ct.x*w-ct.rx,ct.y*h-ct.ry,ct.rx*2,ct.ry*2);
      // Terrain detail
      for(let i=0;i<200;i++){ctx.fillStyle=`rgba(${30+R()*40},${60+R()*60},${15+R()*30},${R()*.2})`;ctx.fillRect(ct.x*w-ct.rx+R()*ct.rx*2,ct.y*h-ct.ry+R()*ct.ry*2,3+R()*8,3+R()*8)}

    // Ice caps
    [{x:w/2,y:h*.08,r:50},{x:w/2,y:h*.92,r:45}].forEach(ic=>{const g=ctx.createRadialGradient(ic.x,ic.y,0,ic.x,ic.y,ic.r);g.addColorStop(0,'rgba(240,250,255,.9)');g.addColorStop(.6,'rgba(200,230,255,.3)');g.addColorStop(1,'rgba(200,230,255,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(ic.x,ic.y,ic.r,0,P*2);ctx.fill()});
    // Cloud wisps
    for(let i=0;i<60;i++){ctx.strokeStyle=`rgba(255,255,255,${.08+R()*.12})`;ctx.lineWidth=1+R()*3;ctx.beginPath();const sx=R()*w,sy=R()*h;ctx.moveTo(sx,sy);ctx.quadraticCurveTo(sx+20-R()*40,sy+10-R()*20,sx+30-R()*60,sy+5-R()*10);ctx.stroke()}
  }
  // ---- JUPITER ----
  else if(body.jupiter){
    // Horizontal bands
    const bands=[{y:0,c1:'#c4a87c',c2:'#d4b88c'},{y:.12,c1:'#b8956c',c2:'#a08050'},{y:.22,c1:'#ddccaa',c2:'#ccbb99'},{y:.32,c1:'#c49560',c2:'#b88550'},{y:.42,c1:'#e8d5b0',c2:'#d8c5a0'},{y:.5,c1:'#c4a070',c2:'#b89060'},{y:.58,c1:'#ddc8a0',c2:'#cdb890'},{y:.68,c1:'#c09058',c2:'#b08048'},{y:.78,c1:'#d8c098',c2:'#c8b088'},{y:.88,c1:'#b88850',c2:'#a87840'}];
    bands.forEach(b=>{const grd=ctx.createLinearGradient(0,b.y*h,0,b.y*h+h*.12);grd.addColorStop(0,b.c1);grd.addColorStop(.5,b.c2);grd.addColorStop(1,b.c1);ctx.fillStyle=grd;ctx.fillRect(0,b.y*h,w,h*.13)});
    // Turbulence
    for(let i=0;i<2000;i++){ctx.fillStyle=`rgba(${180+R()*75},${120+R()*80},${50+R()*60},${R()*.1})`;ctx.fillRect(R()*w,R()*h,2+R()*10,1+R()*2)}
    // Great Red Spot
    const grsX=w*.65,grsY=h*.45,grsR=40;
    const grsGrd=ctx.createRadialGradient(grsX,grsY,0,grsX,grsY,grsR);
    grsGrd.addColorStop(0,'#e8886a');grsGrd.addColorStop(.3,'#d47050');grsGrd.addColorStop(.7,'#c06040');grsGrd.addColorStop(.9,'#b89070');grsGrd.addColorStop(1,'#c4a87c');
    ctx.fillStyle=grsGrd;ctx.beginPath();ctx.ellipse(grsX,grsY,grsR,grsR*.65,.1,0,P*2);ctx.fill();
    // White ovals
    [{x:.3,y:.35,r:15},{x:.4,y:.7,r:12},{x:.7,y:.2,r:10}].forEach(o=>{const g=ctx.createRadialGradient(o.x*w,o.y*h,0,o.x*w,o.y*h,o.r);g.addColorStop(0,'rgba(240,230,210,.8)');g.addColorStop(1,'rgba(240,230,210,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(o.x*w,o.y*h,o.r,0,P*2);ctx.fill()})
  }
  // ---- SATURN ----
  else if(body.saturn){
    for(let y=0;y<h;y++){const t=y/h;const r=220+S(t*P*3)*20,g=200+S(t*P*3+.5)*25,b=160+S(t*P*2)*20;ctx.fillStyle=`rgb(${r|0},${g|0},${b|0})`;ctx.fillRect(0,y,w,1)}
    for(let i=0;i<800;i++){ctx.fillStyle=`rgba(255,255,220,${R()*.06})`;ctx.fillRect(R()*w,R()*h,2+R()*14,1+R()*2)}
    // Subtle ring shadow projection
    ctx.fillStyle='rgba(0,0,0,.08)';ctx.fillRect(0,h*.45,w,h*.1);
  }
  // ---- MARS ----
  else if(body.mars){
    const mgrd=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w*.55);
    mgrd.addColorStop(0,'#d4552a');mgrd.addColorStop(.3,'#c1440e');mgrd.addColorStop(.7,'#a03008');mgrd.addColorStop(1,'#6a1800');
    ctx.fillStyle=mgrd;ctx.fillRect(0,0,w,h);
    // Surface features
    for(let i=0;i<2500;i++){ctx.fillStyle=`rgba(${160+R()*80},${30+R()*60},${5+R()*20},${R()*.25})`;ctx.fillRect(R()*w,R()*h,2+R()*6,2+R()*6)}
    // Dark highland patches
    [{x:.35,y:.4,r:70},{x:.6,y:.5,r:55},{x:.25,y:.6,r:40}].forEach(d=>{const g=ctx.createRadialGradient(d.x*w,d.y*h,0,d.x*w,d.y*h,d.r);g.addColorStop(0,'rgba(80,20,5,.5)');g.addColorStop(1,'rgba(80,20,5,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(d.x*w,d.y*h,d.r,0,P*2);ctx.fill()});
    // Polar ice caps
    [{x:w/2,y:h*.06,r:35},{x:w/2,y:h*.94,r:30}].forEach(ic=>{const g=ctx.createRadialGradient(ic.x,ic.y,0,ic.x,ic.y,ic.r);g.addColorStop(0,'rgba(255,250,245,.85)');g.addColorStop(.5,'rgba(240,230,220,.3)');g.addColorStop(1,'rgba(240,230,220,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(ic.x,ic.y,ic.r,0,P*2);ctx.fill()});
    // Dust storm wisps
    for(let i=0;i<20;i++){ctx.strokeStyle=`rgba(200,150,100,${.1+R()*.15})`;ctx.lineWidth=1+R()*2;ctx.beginPath();const sx=R()*w,sy=R()*h;ctx.moveTo(sx,sy);ctx.quadraticCurveTo(sx+30-R()*60,sy+10-R()*20,sx+40-R()*80,sy);ctx.stroke()}
  }
  // ---- VENUS ----
  else if(body.venus){
    const vgrd=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w*.55);
    vgrd.addColorStop(0,'#f0dfc0');vgrd.addColorStop(.3,'#e8cda0');vgrd.addColorStop(.7,'#d8b880');vgrd.addColorStop(1,'#b89860');
    ctx.fillStyle=vgrd;ctx.fillRect(0,0,w,h);
    // Swirling cloud patterns
    for(let i=0;i<1500;i++){const x=R()*w,y=R()*h;ctx.fillStyle=`rgba(${220+R()*35},${180+R()*50},${120+R()*40},${R()*.15})`;ctx.fillRect(x,y,3+R()*10,2+R()*4)}
    // Y-shaped cloud feature
    for(let i=0;i<5;i++){ctx.strokeStyle=`rgba(240,220,180,${.2+R()*.15})`;ctx.lineWidth=3+R()*5;ctx.beginPath();const sx=w*.3,sy=h*(.3+i*.1);ctx.moveTo(sx,sy);ctx.quadraticCurveTo(w*.5,sy-20+R()*40,w*.7,sy+10-R()*20);ctx.stroke()}
  }
  // ---- ICE GIANTS (Uranus/Neptune) ----
  else if(body.ice){
    const base=body.id==='uranus'?'#7ec8e3':'#3355cc';
    ctx.fillStyle=base;ctx.fillRect(0,0,w,h);
    for(let i=0;i<1200;i++){ctx.fillStyle=`rgba(255,255,255,${R()*.06})`;ctx.fillRect(R()*w,R()*h,2+R()*8,1+R()*2)}
    if(body.id==='neptune'){for(let i=0;i<300;i++){ctx.fillStyle=`rgba(100,150,255,${R()*.15})`;ctx.fillRect(R()*w,R()*h,3+R()*12,2+R()*3)}}
    // Limb darkening
    const ld=ctx.createRadialGradient(w/2,h/2,w*.4,w/2,h/2,w*.55);ld.addColorStop(0,'rgba(0,0,0,0)');ld.addColorStop(1,'rgba(0,0,20,.4)');ctx.fillStyle=ld;ctx.fillRect(0,0,w,h);
  }
  // ---- MOON ----
  else if(body.moon){
    ctx.fillStyle='#c8c8c8';ctx.fillRect(0,0,w,h);
    // Maria (dark plains)
    [{x:.4,y:.4,r:70,rx:80,ry:65},{x:.55,y:.5,r:50,rx:60,ry:45},{x:.3,y:.55,r:55,rx:50,ry:60}].forEach(m=>{ctx.save();ctx.beginPath();ctx.ellipse(m.x*w,m.y*h,m.rx||m.r,m.ry||m.r,R()*.5,0,P*2);ctx.clip();ctx.fillStyle='#999999';ctx.fillRect(0,0,w,h);ctx.restore()});
    // Craters
    for(let i=0;i<300;i++){const cx=R()*w,cy=R()*h,cr=2+R()*15;ctx.strokeStyle=`rgba(180,180,180,${.3+R()*.4})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,cr,0,P*2);ctx.stroke();ctx.fillStyle=`rgba(200,200,200,${.1+R()*.2})`;ctx.fill()}
    // Bright highlands
    for(let i=0;i<800;i++){ctx.fillStyle=`rgba(220,220,220,${R()*.2})`;ctx.fillRect(R()*w,R()*h,2+R()*6,2+R()*6)}
  }
  // ---- ROCKY (Mercury, Pluto, etc) ----
  else if(body.rocky){
    ctx.fillStyle=col;ctx.fillRect(0,0,w,h);
    for(let i=0;i<2000;i++){ctx.fillStyle=`rgba(${R()>.5?'255,255,255':'0,0,0'},${R()*.12})`;ctx.fillRect(R()*w,R()*h,1+R()*4,1+R()*4)}
    for(let i=0;i<80;i++){const cx=R()*w,cy=R()*h,cr=1+R()*10;ctx.strokeStyle=`rgba(255,255,255,${.15+R()*.2})`;ctx.lineWidth=.5;ctx.beginPath();ctx.arc(cx,cy,cr,0,P*2);ctx.stroke()}
  }
  // ---- STARS ----
  else if(body.star){
    const grd=ctx.createRadialGradient(w/2,h/2,w*.02,w/2,h/2,w*.55);
    const brightCol=body.color;const r=(brightCol>>16)&255,g=(brightCol>>8)&255,b=brightCol&255;
    grd.addColorStop(0,`rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`);

    grd.addColorStop(.6,`rgb(${Math.max(0,r-100)},${Math.max(0,g-80)},${Math.max(0,b-50)})`);
    grd.addColorStop(1,`rgb(${Math.max(0,r-180)},${Math.max(0,g-150)},${Math.max(0,b-100)})`);
    ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);
    for(let i=0;i<1500;i++){ctx.fillStyle=`rgba(255,255,255,${R()*.1})`;ctx.fillRect(R()*w,R()*h,1+R()*3,1+R()*3)}
  }
  // ---- NEBULAE / CLUSTERS / GALAXIES (sprites) ----
  else if(body.neb||body.clust||body.gal){
    const grd=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w/2);
    grd.addColorStop(0,col+'ee');grd.addColorStop(.25,col+'88');grd.addColorStop(.5,col+'33');grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);
    for(let i=0;i<300;i++){ctx.fillStyle=`rgba(255,255,255,${R()*.6})`;ctx.beginPath();ctx.arc(R()*w,R()*h,R()*3.5,0,P*2);ctx.fill()}
    if(body.gal){for(let arm=0;arm<3;arm++){const aa=arm*P*2/3;ctx.strokeStyle=`rgba(255,255,255,${.08+R()*.08})`;ctx.lineWidth=2;ctx.beginPath();for(let t=0;t<1;t+=.02){const a=aa+t*P*2.5,r=t*w*.45;ctx.lineTo(w/2+C(a)*r,h/2+S(a)*r)}ctx.stroke()}}
  }
  // ---- DEFAULT ----
  else {
    ctx.fillStyle=col;ctx.fillRect(0,0,w,h);
    for(let i=0;i<500;i++){ctx.fillStyle=`rgba(255,255,255,${R()*.06})`;ctx.fillRect(R()*w,R()*h,2+R()*6,2+R()*4)}
  }

  return new THREE.CanvasTexture(c);
}

// ═══════════ CREATE BODIES ═══════════
const meshes=new Map(),selectable=[];
bodies.forEach(b=>{
  let mesh;const s=b.size*.4;
  if(b.bh){
    mesh=new THREE.Mesh(new THREE.SphereGeometry(s,48,48),new THREE.MeshBasicMaterial({color:0x000011}));
    const ring=new THREE.Mesh(new THREE.TorusGeometry(s*1.5,s*.15,16,64),new THREE.MeshBasicMaterial({color:0x8844ff,transparent:true,opacity:.7}));ring.rotation.x=P/2;mesh.add(ring);
    const glow=new THREE.Mesh(new THREE.SphereGeometry(s*2.5,32,32),new THREE.ShaderMaterial({uniforms:{uC:{value:new THREE.Color(0x4422aa)},uT:{value:0}},vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',fragmentShader:'varying vec3 vN;uniform vec3 uC;uniform float uT;void main(){float i=pow(.7-dot(vN,vec3(0,0,1)),3.);gl_FragColor=vec4(uC,i*.6);}',transparent:true,depthWrite:false}));mesh.add(glow);
  }else if(b.neb||b.clust||b.gal){
    const tex=makeTexture(b);
    mesh=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.85}));mesh.scale.set(s*6,s*6,1);
  }else{
    const tex=makeTexture(b);
    const isStar=b.star;
    mesh=new THREE.Mesh(new THREE.SphereGeometry(s,64,64),new THREE.MeshStandardMaterial({map:tex,roughness:isStar?.2:.7,metalness:.05,emissive:isStar?b.color:0,emissiveIntensity:isStar?1:0}));
    if(isStar){const gg=new THREE.Mesh(new THREE.SphereGeometry(s*1.6,32,32),new THREE.ShaderMaterial({uniforms:{uC:{value:new THREE.Color(b.color)}},vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',fragmentShader:'varying vec3 vN;uniform vec3 uC;void main(){float i=pow(.65-dot(vN,vec3(0,0,1)),3.);gl_FragColor=vec4(uC,i*.7);}',transparent:true,depthWrite:false}));mesh.add(gg)}
    if(b.rings){
      // Multi-layered ring system
      for(let l=0;l<3;l++){const inner=s*(1.4+l*.25),outer=s*(1.55+l*.25);const rGeo=new THREE.TorusGeometry((inner+outer)/2,(outer-inner)/2,8,128);const alpha=.15+l*.1;const rMat=new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(.12,l*.05,.6+l*.15),roughness:.6,side:THREE.DoubleSide,transparent:true,opacity:.4+l*.2});const rMesh=new THREE.Mesh(rGeo,rMat);rMesh.rotation.x=P/2.4+(l-1)*.08;mesh.add(rMesh)}
    }
  }
  mesh.position.set(...b.pos);mesh.name=b.id;mesh.userData={bodyId:b.id,isBody:true};scene.add(mesh);meshes.set(b.id,mesh);
  if(!b.neb&&!b.clust&&!b.gal)selectable.push(mesh);
});

const bodyBGs=new Map();
function makeParticleTex(color,size){const c=document.createElement('canvas');c.width=size;c.height=size;const ctx=c.getContext('2d');const grd=ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);grd.addColorStop(0,color);grd.addColorStop(1,'transparent');ctx.fillStyle=grd;ctx.fillRect(0,0,size,size);return new THREE.CanvasTexture(c)}

function createBodyBG(bodyId){
  const b=bodies.find(x=>x.id===bodyId);if(!b)return null;
  const g=new THREE.Group();g.name='bg-'+bodyId;g.userData={isBackground:true,bodyId:bodyId};

  // ---- Solar corona for Sun ----
  if(b.id==='sun'){
    const count=2000;const geo=new THREE.BufferGeometry();const pos=new Float32Array(count*3),col=new Float32Array(count*3);
    for(let i=0;i<count;i++){const a=R()*P*2,ph=R()*P*.4,r=b.size*.4*(1+R()*3);pos[i*3]=C(a)*C(ph)*r;pos[i*3+1]=S(ph)*r;pos[i*3+2]=S(a)*C(ph)*r;const t=R();col[i*3]=1;col[i*3+1]=.5+t*.4;col[i*3+2]=t*.3}
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    g.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.3,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.7})));
  }
  // ---- Inner planets: solar wind particles ----
  else if(['mercury','venus'].includes(b.id)){
    const count=800;const geo=new THREE.BufferGeometry();const pos=new Float32Array(count*3);
    for(let i=0;i<count;i++){const a=R()*P*2,r=b.size*.4*(2+R()*5);pos[i*3]=C(a)*r;pos[i*3+1]=(R()-.5)*b.size*.6;pos[i*3+2]=S(a)*r}
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    const col=b.id==='mercury'?0xffaa66:0xffddaa;
    g.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.12,color:col,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.5})));
  }
  // ---- Earth: blue atmosphere + aurora ----
  else if(b.id==='earth'){
    const ag=new THREE.Mesh(new THREE.SphereGeometry(b.size*.48,32,32),new THREE.ShaderMaterial({uniforms:{uC:{value:new THREE.Color(0x4488ff)}},vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',fragmentShader:'varying vec3 vN;uniform vec3 uC;void main(){float i=pow(1.-abs(dot(vN,vec3(0,0,1))),4.);gl_FragColor=vec4(uC,i*.35);}',transparent:true,depthWrite:false}));g.add(ag);
    // Blue particle halo
    const count=500;const geo=new THREE.BufferGeometry();const pos=new Float32Array(count*3);
    for(let i=0;i<count;i++){const a=R()*P*2,ph=(R()-.5)*P*.15,r=b.size*.48*(1+R()*.2);pos[i*3]=C(a)*C(ph)*r;pos[i*3+1]=S(ph)*r;pos[i*3+2]=S(a)*C(ph)*r}
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    g.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.08,color:0x88bbff,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.6})));
  }
  // ---- Mars: dust storm halo ----

const clock=new THREE.Clock();
function render(){
  requestAnimationFrame(render);
  const dt=Math.min(clock.getDelta(),.1);
  if(camera.position.distanceTo(cameraGoal)>.1){camera.position.lerp(cameraGoal,.08);camera.lookAt(lookGoal)}
  stars.rotation.y+=.00006;stars.rotation.x+=.00003;
  // Rotate Sun
  const sunMesh=meshes.get('sun');if(sunMesh)sunMesh.rotation.y+=.0015;
  // Rotate bodies & animate backgrounds
  meshes.forEach((m,id)=>{const b=bodies.find(x=>x.id===id);if(!b||b.neb||b.clust)return;if(id==='sun')return;if(b.star)m.rotation.y+=.0003;else if(!b.gal&&!b.bh)m.rotation.y+=.002;});
  // Pulse black hole glows
  bodies.filter(b=>b.bh).forEach(b=>{const m=meshes.get(b.id);if(m)m.children.forEach(c=>{if(c.material&&c.material.uniforms&&c.material.uniforms.uT)c.material.uniforms.uT.value+=dt})});
  // Animate body backgrounds
  if(activeBodyBG&&activeBodyBG.visible)activeBodyBG.rotation.y+=.002;
  // Animate scale backgrounds
  if(activeScaleBG)activeScaleBG.rotation.y+=.0001;
  // Rotate rings on Saturn
  const saturnMesh=meshes.get('saturn');if(saturnMesh)saturnMesh.children.forEach(c=>{if(c.geometry&&c.geometry.type==='TorusGeometry')c.rotation.z+=.0005});
  // Immersive rotation
  if(isImmersive&&selectedId){const m=meshes.get(selectedId);if(m)m.rotation.y+=.004}
  sunLight.position.copy(camera.position);
  renderer.render(scene,camera);
}
log('Ready!');render();
log('All systems go - click or use sidebar!');
</script>
</body>

  {id:'sirius',name:'天狼星',en:'Sirius A',type:'A型主序星',scale:1,dia:'~2,400,000 km',temp:'9,940°C',dist:'8.6光年',desc:'夜空中最亮的恒星，位于大犬座。',color:0xffffff,size:5,pos:[-60,40,-90],imm:true,tag:'star'},

  {id:'betelgeuse',name:'参宿四',en:'Betelgeuse',type:'红超巨星',scale:1,dia:'~12亿 km',temp:'3,500°C',dist:'548光年',desc:'猎户座红超巨星。预计10万年内超新星爆发。',color:0xff3311,size:6.5,pos:[-20,100,-60],imm:true,tag:'star'},
  {id:'polaris',name:'北极星',en:'Polaris',type:'F型超巨星',scale:1,temp:'6,015°C',dist:'433光年',desc:'几乎正对地球自转轴，是导航的重要参照。',color:0xffffee,size:5.2,pos:[30,130,-50],imm:true,tag:'star'},

  {id:'m42',name:'猎户座大星云',en:'Orion Nebula M42',type:'发射星云',scale:2,dia:'~24光年',dist:'1,344光年',desc:'夜空中最亮的星云之一，活跃的恒星形成区。',color:0xff5599,size:4,pos:[-80,40,-200],imm:true,tag:'neb'},

  {id:'pleiades',name:'昴星团',en:'Pleiades M45',type:'疏散星团',scale:2,dia:'~16光年',dist:'444光年',desc:'金牛座最著名的疏散星团。中国二十八宿之一。',color:0x88aadd,size:5,pos:[50,30,-180],imm:true,tag:'clust'},
  {id:'andromeda',name:'仙女座星系',en:'Andromeda M31',type:'旋涡星系',scale:3,dia:'~22万光年',mass:'1.23E12 M☉',dist:'254万光年',desc:'本星系群最大星系，正以110km/s接近银河系，约45亿年后碰撞合并。',color:0xddccaa,size:7,pos:[0,0,-600],imm:true,tag:'gal'},

  {id:'lmc',name:'大麦哲伦云',en:'LMC',type:'不规则矮星系',scale:3,dia:'~14,000光年',dist:'16.3万光年',desc:'银河系最大的卫星星系。1987年在此观测到超新星SN 1987A。',color:0x99aadd,size:4,pos:[250,-150,-550],tag:'gal'},
  {id:'virgo-sc',name:'室女座超星系团',en:'Virgo Supercluster',type:'超星系团',scale:4,dia:'~1.1亿光年',desc:'包含本星系群在内约100个星系群和星系团。',color:0x554488,size:20,pos:[0,0,-1200]},

];
// Init orbital angles
bodies.forEach(b=>{if(b.orbitDist){b._angle=Math.random()*Math.PI*2}});
log('Data: '+bodies.length);

// ═══════════ STATE ═══════════
let currentScale=0,selectedId=null,sidebarOpen=false,isImmersive=false;
let pivot=new THREE.Vector3(0,0,0),spherical=new THREE.Spherical(60,Math.PI/3,0);
let dragging=false,dragMoved=false,prevMouse={x:0,y:0};
let cameraGoal=new THREE.Vector3(),lookGoal=new THREE.Vector3();

// ═══════════ THREE.JS ═══════════
log('Three.js...');
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000008,0.000006);
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,20000);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});

renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.3;

scene.add(new THREE.AmbientLight(0x111144,2));
const sunLight=new THREE.PointLight(0xffeedd,300,300,.5);scene.add(sunLight);

// ═══════════ VIBRANT STARFIELD ═══════════
log('Starfield...');
const starCount=8000,starPos=new Float32Array(starCount*3),starCol=new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){

// ═══════════ TEXTURES ═══════════
function makeTex(body){
  const SZ=512,c=document.createElement('canvas');c.width=SZ;c.height=SZ;
  const ctx=c.getContext('2d'),w=SZ,h=SZ,col='#'+body.color.toString(16).padStart(6,'0');
  if(body.tag==='star'){
    const g=ctx.createRadialGradient(w/2,h/2,w*.02,w/2,h/2,w*.55);

    for(let i=0;i<cnt;i++){const a=Math.random()*Math.PI*2,ph=Math.random()*Math.PI*.35,r=SZ*(1+Math.random()*3.5);p[i*3]=Math.cos(a)*Math.cos(ph)*r;p[i*3+1]=Math.sin(ph)*r;p[i*3+2]=Math.sin(a)*Math.cos(ph)*r;c[i*3]=1;c[i*3+1]=.3+Math.random()*.6;c[i*3+2]=Math.random()*.25}
    geo.setAttribute('position',new THREE.BufferAttribute(p,3));geo.setAttribute('color',new THREE.BufferAttribute(c,3));
    g.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.3,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.75})));
  }else if(b.tag==='star'){
    const cnt=1200,geo=new THREE.BufferGeometry(),p=new Float32Array(cnt*3),c=new Float32Array(cnt*3);const sc=new THREE.Color(b.color);
    for(let i=0;i<cnt;i++){const a=Math.random()*Math.PI*2,ph=(Math.random()-.5)*Math.PI*.3,r=SZ*(1+Math.random()*3);p[i*3]=Math.cos(a)*Math.cos(ph)*r;p[i*3+1]=Math.sin(ph)*r;p[i*3+2]=Math.sin(a)*Math.cos(ph)*r;c[i*3]=sc.r;c[i*3+1]=sc.g;c[i*3+2]=sc.b}
    geo.setAttribute('position',new THREE.BufferAttribute(p,3));geo.setAttribute('color',new THREE.BufferAttribute(c,3));
    g.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.25,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.7})));
  }else if(b.id==='earth'){
    const cnt=500,geo=new THREE.BufferGeometry(),p=new Float32Array(cnt*3);
    for(let i=0;i<cnt;i++){const a=Math.random()*Math.PI*2,ph=(Math.random()-.5)*Math.PI*.12,r=SZ*(1+Math.random()*.25);p[i*3]=Math.cos(a)*Math.cos(ph)*r;p[i*3+1]=Math.sin(ph)*r;p[i*3+2]=Math.sin(a)*Math.cos(ph)*r}
    geo.setAttribute('position',new THREE.BufferAttribute(p,3));
    g.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.07,color:0x88bbff,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.6})));
    const ag=new THREE.Mesh(new THREE.SphereGeometry(SZ,32,32),new THREE.ShaderMaterial({uniforms:{uC:{value:new THREE.Color(0x4488ff)}},vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',fragmentShader:'varying vec3 vN;uniform vec3 uC;void main(){float i=pow(1.-abs(dot(vN,vec3(0,0,1))),4.);gl_FragColor=vec4(uC,i*.35);}',transparent:true,depthWrite:false}));g.add(ag);
  }else if(b.id==='jupiter'){
    const cnt=1500,geo=new THREE.BufferGeometry(),p=new Float32Array(cnt*3);
    for(let i=0;i<cnt;i++){const a=Math.random()*Math.PI*2,r=SZ+(Math.random()<.25?Math.random()*SZ*4:0);p[i*3]=Math.cos(a)*r;p[i*3+1]=(Math.random()-.5)*SZ*.25;p[i*3+2]=Math.sin(a)*r}
    geo.setAttribute('position',new THREE.BufferAttribute(p,3));
    g.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.15,color:0xffaa66,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.45})));
  }else if(b.id==='saturn'){
    const cnt=2000,geo=new THREE.BufferGeometry(),p=new Float32Array(cnt*3);
    for(let i=0;i<cnt;i++){const a=Math.random()*Math.PI*2,r=SZ+Math.random()*SZ*4;p[i*3]=Math.cos(a)*r;p[i*3+1]=(Math.random()-.5)*SZ*.06;p[i*3+2]=Math.sin(a)*r}
    geo.setAttribute('position',new THREE.BufferAttribute(p,3));
    g.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.05,color:0xeeddcc,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.55})));
    const cnt2=600,geo2=new THREE.BufferGeometry(),p2=new Float32Array(cnt2*3);
    for(let i=0;i<cnt2;i++){const a=Math.random()*Math.PI*2,ph=(Math.random()-.5)*Math.PI*.2,r=SZ*(1+Math.random()*.5);p2[i*3]=Math.cos(a)*Math.cos(ph)*r;p2[i*3+1]=Math.sin(ph)*r;p2[i*3+2]=Math.sin(a)*Math.cos(ph)*r}
    geo2.setAttribute('position',new THREE.BufferAttribute(p2,3));
    g.add(new THREE.Points(geo2,new THREE.PointsMaterial({size:.06,color:0xddeeff,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.45})));
  }else if(b.tag==='ice'||b.tag==='rock'||b.id==='mars'||b.id==='venus'||b.id==='mercury'){
    const cnt=400,geo=new THREE.BufferGeometry(),p=new Float32Array(cnt*3);const clr=b.color;
    for(let i=0;i<cnt;i++){const a=Math.random()*Math.PI*2,ph=(Math.random()-.5)*Math.PI*.18,r=SZ*(1+Math.random()*.3);p[i*3]=Math.cos(a)*Math.cos(ph)*r;p[i*3+1]=Math.sin(ph)*r;p[i*3+2]=Math.sin(a)*Math.cos(ph)*r}
    geo.setAttribute('position',new THREE.BufferAttribute(p,3));
    g.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.08,color:clr,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.35})));
  }else if(b.tag==='bh'){
    const cnt=2000,geo=new THREE.BufferGeometry(),p=new Float32Array(cnt*3);
    for(let i=0;i<cnt;i++){const a=Math.random()*Math.PI*2,r=SZ*.6+Math.random()*SZ*2.5;p[i*3]=Math.cos(a)*r;p[i*3+1]=(Math.random()-.5)*SZ*.12;p[i*3+2]=Math.sin(a)*r}
    geo.setAttribute('position',new THREE.BufferAttribute(p,3));
    g.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.12,color:0x8844ff,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.55})));
    for(let side=0;side<2;side++){const jcnt=500,jgeo=new THREE.BufferGeometry(),jp=new Float32Array(jcnt*3);const dir=side===0?1:-1;for(let i=0;i<jcnt;i++){const r=Math.random()*SZ*.25,h=dir*(SZ*.4+Math.random()*SZ*3.5);jp[i*3]=(Math.random()-.5)*r;jp[i*3+1]=h;jp[i*3+2]=(Math.random()-.5)*r}jgeo.setAttribute('position',new THREE.BufferAttribute(jp,3));g.add(new THREE.Points(jgeo,new THREE.PointsMaterial({size:.08,color:0x6644cc,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.4})))}
  }
  if(g.children.length>0){g.position.set(...b.pos);g.visible=false;scene.add(g);return g}
  return null;
}
bodies.filter(b=>b.scale<=2&&b.tag).forEach(b=>{const bg=makeBodyBG(b.id);if(bg)bodyBGs.set(b.id,bg)});
log('Body BGs:'+bodyBGs.size);
let activeBodyBG=null;

// ═══════════ CAMERA ═══════════
function updateCam(){const pos=new THREE.Vector3().setFromSpherical(spherical).add(pivot);camera.position.copy(pos);camera.lookAt(pivot);cameraGoal.copy(pos);lookGoal.copy(pivot)}
updateCam();
function setPivot(np){const off=camera.position.clone().sub(np);spherical.setFromVector3(off);pivot.copy(np);updateCam()}
renderer.domElement.addEventListener('pointerdown',e=>{dragging=true;dragMoved=false;prevMouse={x:e.clientX,y:e.clientY}});
window.addEventListener('pointerup',()=>dragging=false);
window.addEventListener('pointermove',e=>{if(!dragging||isImmersive)return;const dx=e.clientX-prevMouse.x,dy=e.clientY-prevMouse.y;if(Math.abs(dx)>1||Math.abs(dy)>1)dragMoved=true;spherical.theta-=dx*.005;spherical.phi-=dy*.005;spherical.phi=Math.max(.05,Math.min(Math.PI*.49,spherical.phi));prevMouse={x:e.clientX,y:e.clientY};updateCam()});
renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();spherical.radius*=1+e.deltaY*.001;spherical.radius=Math.max(3,Math.min(800,spherical.radius));updateCam();const r=spherical.radius;let ns=r<40?0:r<150?1:r<300?2:r<500?3:4;if(ns!==currentScale)setScale(ns)},{passive:false});

// ═══════════ RAYCASTER - FIXED ═══════════
const raycaster=new THREE.Raycaster();raycaster.params.Points.threshold=2;raycaster.params.Sprite={threshold:3};
renderer.domElement.addEventListener('click',e=>{
  if(dragMoved||isImmersive)return;
  const mouse=new THREE.Vector2((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(selectable,true);
  if(hits.length>0){
    let obj=hits[0].object;
    while(obj&&!obj.userData.bodyId)obj=obj.parent;
    if(obj&&obj.userData.bodyId&&obj.userData.bodyId!==selectedId)selectBody(obj.userData.bodyId);
  }
});

// ═══════════ SELECTION ═══════════
function selectBody(id){
  const b=bodies.find(x=>x.id===id);if(!b)return;
  selectedId=id;setPivot(new THREE.Vector3(...b.pos));
  if(b.scale!==currentScale){currentScale=b.scale;updateScaleBar()}
  if(activeBodyBG){activeBodyBG.visible=false}
  const bg=bodyBGs.get(id);
  if(bg){bg.visible=true;activeBodyBG=bg}
  updateInfoPanel();updateSidebar();
  const fi=$('focus-indicator');fi.textContent='🔭 聚焦: '+b.name+' ('+b.en+')';fi.classList.add('show');setTimeout(()=>fi.classList.remove('show'),3000);
}
function deselectBody(){if(activeBodyBG){activeBodyBG.visible=false;activeBodyBG=null}selectedId=null;updateInfoPanel();updateSidebar()}
function setScale(s){if(s===currentScale)return;currentScale=s;if(selectedId){const b=bodies.find(x=>x.id===selectedId);if(b&&b.scale!==s)deselectBody()}updateScaleBar();updateSidebar()}
function flyScale(s){const cfg={0:{p:[0,30,60],l:[0,0,0]},1:{p:[0,30,200],l:[0,0,-80]},2:{p:[0,30,350],l:[0,0,-200]},3:{p:[0,50,700],l:[150,0,-550]},4:{p:[0,80,1600],l:[0,0,-1200]}};const c=cfg[s]||cfg[0];pivot.set(...c.l);const off=new THREE.Vector3(...c.p).sub(pivot);spherical.setFromVector3(off);updateCam()}

// ═══════════ UI ═══════════
const splashWrap=$('splash-wrap');let splashDone=false;
function dismissSplash(){if(splashDone)return;splashDone=true;splashWrap.style.opacity='0';splashWrap.style.transition='opacity .6s';splashWrap.style.pointerEvents='none';setTimeout(()=>splashWrap.style.display='none',600)}
splashWrap.addEventListener('click',dismissSplash);document.addEventListener('keydown',dismissSplash);
const sidebar=$('sidebar'),btnMenu=$('btn-menu'),searchBox=$('search-box'),treeEl=$('celestial-tree');
btnMenu.addEventListener('click',()=>{sidebarOpen=!sidebarOpen;sidebar.classList.toggle('open',sidebarOpen)});
searchBox.addEventListener('input',()=>updateSidebar(searchBox.value));
function updateSidebar(q){treeEl.innerHTML='';const results=q?bodies.filter(b=>b.name.includes(q)||b.en.toLowerCase().includes(q.toLowerCase())):null;if(results){if(!results.length)treeEl.innerHTML='<div class="tree-cat">未找到</div>';else results.forEach(b=>treeEl.appendChild(makeNode(b)));return}SCALES.forEach(s=>{const cat=document.createElement('div');cat.className='tree-cat';cat.textContent=s.icon+' '+s.name;treeEl.appendChild(cat);bodies.filter(b=>b.scale===s.id&&!b.parent).forEach(b=>{treeEl.appendChild(makeNode(b));bodies.filter(c=>c.parent===b.id).forEach(c=>{const n=makeNode(c);n.classList.add('child');treeEl.appendChild(n)})})})}
function makeNode(b){const d=document.createElement('div');d.className='tree-node';d.textContent=b.name+' ('+b.en+')';if(b.id===selectedId)d.classList.add('sel');d.addEventListener('click',()=>{selectBody(b.id);sidebarOpen=false;sidebar.classList.remove('open');updateSidebar(searchBox.value)});return d}
const infoPanel=$('info-panel');$('btn-close-info').addEventListener('click',()=>deselectBody());
function updateInfoPanel(){const b=bodies.find(x=>x.id===selectedId);if(!b){infoPanel.classList.remove('show');return}infoPanel.querySelector('.body-name').textContent=b.name;infoPanel.querySelector('.en').textContent=b.en;const rows=infoPanel.querySelector('.rows');rows.innerHTML='';[['类型',b.type],['直径',b.dia],['质量',b.mass],['温度',b.temp],['距离',b.dist]].forEach(([l,v])=>{if(v){const r=document.createElement('div');r.className='row';r.innerHTML='<span class="lbl">'+l+'</span><span>'+v+'</span>';rows.appendChild(r)}});infoPanel.querySelector('.desc').textContent=b.desc;$('btn-immersive').style.display=b.imm?'block':'none';infoPanel.classList.add('show')}
$('btn-immersive').addEventListener('click',()=>{if(!selectedId||isImmersive)return;isImmersive=true;const b=bodies.find(x=>x.id===selectedId),mesh=meshes.get(selectedId);if(mesh&&b){const p=mesh.position;camera.position.set(p.x+b.size*1.2,p.y+b.size*.6,p.z+b.size*1.5);camera.lookAt(p)}$('imm-overlay').appendChild(renderer.domElement);$('imm-overlay').classList.add('act');const hint=$('imm-hint');hint.textContent=b?.imm?'3D沉浸模式 · ESC退出':'该天体3D视频资源暂不可用';hint.classList.add('show');setTimeout(()=>hint.classList.remove('show'),4000)});
$('btn-exit-imm').addEventListener('click',exitImm);
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&isImmersive)exitImm()});
function exitImm(){isImmersive=false;$('app').appendChild(renderer.domElement);$('imm-overlay').classList.remove('act');$('imm-hint').classList.remove('show')}
const scaleBar=$('scale-bar');
SCALES.forEach(s=>{const item=document.createElement('div');item.className='scale-item';item.dataset.s=s.id;item.innerHTML='<span class="scale-icon">'+s.icon+'</span><span>'+s.name+'</span>';item.addEventListener('click',()=>{setScale(s.id);flyScale(s.id)});scaleBar.appendChild(item)});
function updateScaleBar(){scaleBar.querySelectorAll('.scale-item').forEach(el=>el.classList.toggle('act',+el.dataset.s===currentScale))}
updateSidebar();updateScaleBar();scaleBar.querySelector('[data-s="0"]')?.classList.add('act');

// ═══════════ RENDER LOOP - WITH ORBITAL MECHANICS ═══════════
const clock=new THREE.Clock();
let frameCount=0,timeAccum=0;
function render(){
  requestAnimationFrame(render);
  frameCount++;
  try{
    const dt=Math.min(clock.getDelta(),.1);
    timeAccum+=dt;
    // Smooth camera
    if(camera.position.distanceTo(cameraGoal)>.05){camera.position.lerp(cameraGoal,.08);camera.lookAt(lookGoal)}
    // Starfield
    stars.rotation.y+=.00005;stars.rotation.x+=.00003;
    // Sun rotation
    const sm=meshes.get('sun');if(sm)sm.rotation.y+=.0015;

    // ═══ ORBITAL MOTION ═══
    bodies.forEach(b=>{
      if(!b.orbitDist||!b.parent)return;
      b._angle+=b.orbitSpeed*dt*.15; // Slow down for visual appeal
      const parentMesh=meshes.get(b.parent);
      const px=parentMesh?parentMesh.position.x:0;
      const py=parentMesh?parentMesh.position.y:0;
      const pz=parentMesh?parentMesh.position.z:0;
      const nx=px+Math.cos(b._angle)*b.orbitDist;
      const nz=pz+Math.sin(b._angle)*b.orbitDist;
      const ny=py+(Math.sin(b._angle*1.7)*b.orbitDist*.03); // Slight inclination
      const mesh=meshes.get(b.id);
      if(mesh){mesh.position.set(nx,ny,nz);b.pos=[nx,ny,nz]}
      // Move body background too
      const bg=bodyBGs.get(b.id);
      if(bg&&bg.visible)bg.position.copy(mesh?mesh.position:new THREE.Vector3(nx,ny,nz));
    });

    // Body rotations
    meshes.forEach((m,id)=>{
      const b=bodies.find(x=>x.id===id);if(!b||b.tag==='neb'||b.tag==='clust')return;
      if(id==='sun')return;
      if(b.tag==='star')m.rotation.y+=.0004;
      else if(b.tag!=='gal'&&b.tag!=='bh')m.rotation.y+=.003;
    });

    // Black hole pulse
    bodies.filter(b=>b.tag==='bh').forEach(b=>{const m=meshes.get(b.id);if(m)m.children.forEach(c=>{if(c.material&&c.material.uniforms&&c.material.uniforms.uT)c.material.uniforms.uT.value+=dt})});

    // Animate backgrounds
    if(activeBodyBG&&activeBodyBG.visible)activeBodyBG.rotation.y+=.002;
    Object.values(scaleBGs).forEach(bg=>{if(bg&&bg.visible)bg.rotation.y+=.00008});

    // Nebula pulsing
    const bg1=scaleBGs[1];
    if(bg1)bg1.children.forEach(c=>{if(c.userData.nebula){c.material.opacity=c.userData.baseOpacity+Math.sin(timeAccum*c.userData.pulseSpeed)*c.userData.pulseAmp}});

    // Immersive rotation
    if(isImmersive&&selectedId){const m=meshes.get(selectedId);if(m)m.rotation.y+=.005}
    sunLight.position.copy(camera.position);
    renderer.render(scene,camera);
    if(frameCount===1)log('Render OK!');
  }catch(e){log('Rerr:'+e.message)}
}
log('Starting loop...');
render();
log('Ready - click splash');
</script>

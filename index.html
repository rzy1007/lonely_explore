<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>孤独探索 - 天体宇宙</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:"Microsoft YaHei","PingFang SC",sans-serif; color:#fff; user-select:none; -webkit-user-select:none; }
    #app { width:100%; height:100%; position:relative; }
    #status { position:fixed; top:10px; left:10px; z-index:999; color:#0f0; font-size:12px; font-family:monospace; pointer-events:none; }
    #three-canvas { display:block; position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; }

    /* Splash */
    #splash-wrap { position:fixed; top:0; left:0; width:100%; height:100%; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; background:radial-gradient(ellipse at center, #1a0a2e 0%, #0a0510 50%, #000 100%); cursor:pointer; }
    #splash-wrap h1 { font-size:clamp(2.5rem,6vw,5rem); font-weight:700; letter-spacing:0.3em; background:linear-gradient(135deg, #667eea, #764ba2, #f093fb); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    #splash-wrap p { margin-top:1rem; color:rgba(255,255,255,0.6); font-size:clamp(0.9rem,1.5vw,1.2rem); letter-spacing:0.2em; }

    /* Sidebar */
    #sidebar { position:fixed; left:0; top:0; width:280px; height:100%; z-index:10; background:rgba(10,10,30,0.9); backdrop-filter:blur(10px); border-right:1px solid rgba(255,255,255,0.08); transform:translateX(-100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); display:flex; flex-direction:column; overflow:hidden; }
    #sidebar.open { transform:translateX(0); }
    #btn-menu { position:fixed; left:10px; top:10px; z-index:11; width:42px; height:42px; border:1px solid rgba(255,255,255,0.18); border-radius:50%; background:rgba(10,10,30,0.6); backdrop-filter:blur(5px); color:#fff; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.3s; }
    #btn-menu:hover { background:rgba(100,100,200,0.5); }
    #search-box { width:calc(100% - 1.5rem); margin:0.75rem; padding:0.55rem 0.8rem; border:1px solid rgba(255,255,255,0.15); border-radius:8px; background:rgba(255,255,255,0.07); color:#fff; font-size:0.9rem; outline:none; }
    #search-box::placeholder { color:rgba(255,255,255,0.35); }
    #search-box:focus { border-color:rgba(120,140,255,0.5); }
    #celestial-tree { flex:1; overflow-y:auto; padding:0 0.5rem 1rem; }
    .tree-cat { padding:0.6rem 0.7rem 0.2rem; font-size:0.75rem; color:rgba(180,180,220,0.8); font-weight:700; letter-spacing:0.08em; border-bottom:1px solid rgba(255,255,255,0.06); margin-bottom:0.15rem; }
    .tree-node { padding:0.45rem 0.7rem; cursor:pointer; border-radius:6px; transition:background 0.2s; font-size:0.85rem; color:rgba(255,255,255,0.75); }
    .tree-node:hover { background:rgba(255,255,255,0.08); }
    .tree-node.sel { background:rgba(100,140,255,0.25); color:#fff; }
    .child { padding-left:1.8rem !important; font-size:0.78rem !important; }

    /* Info Panel */
    #info-panel { position:fixed; right:16px; top:50%; transform:translateY(-50%) translateX(calc(100% + 30px)); width:300px; max-height:65vh; z-index:10; background:rgba(10,10,30,0.88); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.12); border-radius:14px; padding:1.2rem; transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); overflow-y:auto; }
    #info-panel.show { transform:translateY(-50%) translateX(0); }
    #info-panel h2 { font-size:1.3rem; margin-bottom:0.15rem; }
    #info-panel .en { font-size:0.8rem; color:rgba(255,255,255,0.45); margin-bottom:0.8rem; }
    #info-panel .row { display:flex; justify-content:space-between; padding:0.4rem 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.8rem; }
    #info-panel .row .lbl { color:rgba(255,255,255,0.45); }
    #info-panel .desc { margin-top:0.8rem; font-size:0.8rem; line-height:1.55; color:rgba(255,255,255,0.7); }
    #btn-immersive { display:block; width:100%; margin-top:1rem; padding:0.55rem; border:1px solid rgba(180,140,255,0.4); border-radius:8px; background:linear-gradient(135deg, rgba(102,126,234,0.25), rgba(118,75,162,0.25)); color:#fff; font-size:0.9rem; cursor:pointer; text-align:center; transition:all 0.3s; }
    #btn-immersive:hover { background:linear-gradient(135deg, rgba(102,126,234,0.5), rgba(118,75,162,0.5)); border-color:rgba(200,160,255,0.7); }
    #btn-close-info { position:absolute; top:8px; right:8px; width:28px; height:28px; border:none; background:rgba(255,255,255,0.08); border-radius:50%; color:#fff; cursor:pointer; font-size:0.9rem; display:flex; align-items:center; justify-content:center; }
    #btn-close-info:hover { background:rgba(255,255,255,0.18); }

    /* Scale bar */
    #scale-bar { position:fixed; bottom:25px; left:50%; transform:translateX(-50%); z-index:10; display:flex; gap:2px; background:rgba(10,10,30,0.82); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); border-radius:28px; padding:4px 6px; }
    .scale-item { display:flex; flex-direction:column; align-items:center; padding:6px 12px; cursor:pointer; border-radius:22px; transition:all 0.3s; color:rgba(255,255,255,0.45); font-size:0.7rem; min-width:55px; }
    .scale-item:hover { color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.05); }
    .scale-item.act { color:#fff; background:rgba(100,140,255,0.28); }
    .scale-icon { font-size:1.1rem; margin-bottom:1px; }

    /* Immersive */
    #imm-overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:50; background:#000; display:none; }
    #imm-overlay.act { display:flex; }
    #btn-exit-imm { position:fixed; top:16px; right:16px; z-index:52; padding:0.5rem 1rem; border:1px solid rgba(255,255,255,0.18); border-radius:18px; background:rgba(0,0,0,0.55); color:#fff; cursor:pointer; font-size:0.85rem; transition:all 0.3s; }
    #btn-exit-imm:hover { background:rgba(255,255,255,0.12); }
    #imm-hint { position:fixed; bottom:35px; left:50%; transform:translateX(-50%); z-index:51; padding:0.6rem 1.2rem; background:rgba(0,0,0,0.65); border:1px solid rgba(255,255,255,0.12); border-radius:18px; color:rgba(255,255,255,0.65); font-size:0.8rem; display:none; }
    #imm-hint.show { display:block; }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:2px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="status">loading...</div>

    <!-- Splash -->
    <div id="splash-wrap">
      <h1>孤独探索</h1>
      <p>点击任意位置开始探索宇宙</p>
    </div>

    <!-- Menu -->
    <button id="btn-menu" title="天体目录">☰</button>

    <!-- Sidebar -->
    <div id="sidebar">
      <input type="text" id="search-box" placeholder="搜索天体..." />
      <div id="celestial-tree"></div>
    </div>

    <!-- Info -->
    <div id="info-panel">
      <button id="btn-close-info">✕</button>
      <h2 class="body-name"></h2>
      <div class="en"></div>
      <div class="rows"></div>
      <p class="desc"></p>
      <button id="btn-immersive">沉浸观赏</button>
    </div>

    <!-- Scale -->
    <div id="scale-bar"></div>

    <!-- Immersive -->
    <div id="imm-overlay">
      <button id="btn-exit-imm">✕ 退出沉浸模式</button>
      <div id="imm-hint"></div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "/node_modules/three/build/three.module.js"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const statusEl = document.getElementById('status');
    function log(msg) {
      statusEl.textContent = msg;
      console.log(msg);
    }

    log('Module loaded');

    // ---------- Data ----------
    const SCALES = [
      { id:0, name:'太阳系', icon:'🪐' },
      { id:1, name:'邻近恒星', icon:'⭐' },
      { id:2, name:'银河系', icon:'🌌' },
      { id:3, name:'本星系群', icon:'💫' },
      { id:4, name:'可观测宇宙', icon:'🔭' },
    ];

    const bodies = [
      { id:'sun', name:'太阳', en:'Sun', type:'G型主序星', scale:0, diameter:'1,392,700 km', mass:'1.989×10³⁰ kg', temp:'5,500°C', dist:'太阳系中心', desc:'太阳是太阳系的中心天体，一颗G型主序星。它通过核聚变将氢转化为氦，占太阳系总质量的99.86%。', color:0xffdd44, size:8, pos:[0,0,0], immersive:true },
      { id:'mercury', name:'水星', en:'Mercury', type:'类地行星', scale:0, diameter:'4,879 km', mass:'3.301×10²³ kg', temp:'-173~427°C', dist:'距太阳0.39 AU', desc:'水星是太阳系中最小的行星，几乎没有大气层，表面布满了撞击坑。', color:0xb0a090, size:0.8, pos:[15,0,0], parent:'sun', immersive:true },
      { id:'venus', name:'金星', en:'Venus', type:'类地行星', scale:0, diameter:'12,104 km', mass:'4.867×10²⁴ kg', temp:'462°C', dist:'距太阳0.72 AU', desc:'金星是太阳系中最亮的行星，被称为启明星。浓密的CO₂大气造成极强的温室效应。', color:0xe8cda0, size:1.9, pos:[25,0,0], parent:'sun', immersive:true },
      { id:'earth', name:'地球', en:'Earth', type:'类地行星', scale:0, diameter:'12,742 km', mass:'5.972×10²⁴ kg', temp:'15°C', dist:'距太阳1 AU', desc:'太阳系中唯一已知存在生命的天体。拥有液态水和适中的温度。', color:0x4488cc, size:2, pos:[35,0,0], parent:'sun', immersive:true },
      { id:'mars', name:'火星', en:'Mars', type:'类地行星', scale:0, diameter:'6,779 km', mass:'6.417×10²³ kg', temp:'-63°C', dist:'距太阳1.52 AU', desc:'因其表面的氧化铁而呈红色，拥有太阳系最高山奥林帕斯山(21.9km)。', color:0xcc5533, size:1.7, pos:[50,0,0], parent:'sun', immersive:true },
      { id:'jupiter', name:'木星', en:'Jupiter', type:'气态巨行星', scale:0, diameter:'139,820 km', mass:'1.898×10²⁷ kg', temp:'-110°C', dist:'距太阳5.2 AU', desc:'太阳系中最大的行星，著名的大红斑是持续数百年的巨大风暴。', color:0xddaa77, size:5, pos:[70,0,0], parent:'sun', immersive:true },
      { id:'saturn', name:'土星', en:'Saturn', type:'气态巨行星', scale:0, diameter:'116,460 km', mass:'5.683×10²⁶ kg', temp:'-140°C', dist:'距太阳9.54 AU', desc:'以其壮观的环系统闻名，主要由冰碎片和岩石碎片组成。', color:0xeeddaa, size:4.5, pos:[90,0,0], parent:'sun', rings:true, immersive:true },
      { id:'uranus', name:'天王星', en:'Uranus', type:'冰巨行星', scale:0, diameter:'50,724 km', temp:'-195°C', dist:'距太阳19.2 AU', desc:'自转轴几乎平躺(倾角98°)，呈淡青色。', color:0x99ccdd, size:3.8, pos:[110,0,0], parent:'sun', immersive:true },
      { id:'neptune', name:'海王星', en:'Neptune', type:'冰巨行星', scale:0, diameter:'49,244 km', temp:'-200°C', dist:'距太阳30.05 AU', desc:'太阳系最远行星，风速可达2100km/h，呈现深蓝色。', color:0x3355cc, size:3.6, pos:[130,0,0], parent:'sun', immersive:true },
      { id:'pluto', name:'冥王星', en:'Pluto', type:'矮行星', scale:0, diameter:'2,377 km', temp:'-230°C', dist:'距太阳39.5 AU', desc:'2006年被重新分类为矮行星。拥有心形冰原——汤博区。', color:0xccbbaa, size:0.7, pos:[155,0,0], parent:'sun', immersive:true },
      { id:'moon', name:'月球', en:'Moon', type:'天然卫星', scale:0, diameter:'3,474 km', temp:'-173~127°C', dist:'距地球38.4万km', desc:'地球唯一的天然卫星，人类唯一踏足过的地外天体。', color:0xcccccc, size:0.55, pos:[36.5,2,0], parent:'earth', immersive:true },
      // Scale 1 - Stars
      { id:'proxima', name:'比邻星', en:'Proxima Centauri', type:'红矮星', scale:1, diameter:'~200,000 km', temp:'2,670°C', dist:'4.246光年', desc:'距离太阳最近的恒星。2016年发现宜居带类地行星比邻星b。', color:0xff6644, size:3, pos:[-100,-60,-80], immersive:true },
      { id:'sirius', name:'天狼星', en:'Sirius A', type:'A型主序星', scale:1, diameter:'~2,400,000 km', temp:'9,940°C', dist:'8.6光年', desc:'夜空中最亮的恒星，位于大犬座。古代埃及人据此预测尼罗河泛滥。', color:0xffffff, size:5, pos:[-60,40,-90], immersive:true },
      { id:'vega', name:'织女星', en:'Vega', type:'A型主序星', scale:1, temp:'9,600°C', dist:'25光年', desc:'天琴座最亮星，北半球夏夜最明亮恒星之一。在中国传说中与牛郎星隔银河相望。', color:0xaaccff, size:4.8, pos:[40,80,-70], immersive:true },
      { id:'betelgeuse', name:'参宿四', en:'Betelgeuse', type:'红超巨星', scale:1, diameter:'~12亿km', temp:'3,500°C', dist:'548光年', desc:'猎户座红超巨星，如果放在太阳位置，表面将延伸到木星轨道外。', color:0xff4422, size:6.5, pos:[-20,100,-60], immersive:true },
      { id:'polaris', name:'北极星', en:'Polaris', type:'F型超巨星', scale:1, temp:'6,015°C', dist:'433光年', desc:'几乎正对地球自转轴，是导航的重要参照。约13000年后织女星将成为新的北极星。', color:0xffffee, size:5.2, pos:[30,130,-50], immersive:true },
      // Scale 2 - Milky Way
      { id:'sgra', name:'人马座A*', en:'Sagittarius A*', type:'超大质量黑洞', scale:2, diameter:'~1200万km', mass:'410万 M☉', dist:'26,000光年', desc:'银河系中心超大质量黑洞。2022年EHT拍摄到其光环图像。', color:0x000000, size:6, pos:[0,0,-300], immersive:true, blackhole:true },
      { id:'m42', name:'猎户座大星云', en:'Orion Nebula M42', type:'发射星云', scale:2, diameter:'~24光年', dist:'1,344光年', desc:'夜空中最亮的星云之一，是活跃的恒星形成区。', color:0xff66aa, size:4, pos:[-80,40,-200], immersive:true, nebula:true },
      { id:'m1', name:'蟹状星云', en:'Crab Nebula M1', type:'超新星遗迹', scale:2, diameter:'~11光年', dist:'6,500光年', desc:'1054年超新星爆发遗迹，中国古代详细记录了这次"客星"现象。', color:0x8844cc, size:3.5, pos:[-60,-20,-250], immersive:true, nebula:true },
      { id:'pleiades', name:'昴星团', en:'Pleiades M45', type:'疏散星团', scale:2, diameter:'~16光年', dist:'444光年', desc:'位于金牛座，最著名的疏散星团之一。中国二十八宿之一。', color:0xaaccff, size:5, pos:[50,30,-180], immersive:true, cluster:true },
      // Scale 3 - Local Group
      { id:'andromeda', name:'仙女座星系', en:'Andromeda M31', type:'旋涡星系', scale:3, diameter:'~22万光年', mass:'1.23×10¹² M☉', dist:'254万光年', desc:'本星系群最大星系，正以110km/s接近银河系，约45亿年后碰撞合并。', color:0xddccaa, size:7, pos:[0,0,-600], immersive:true, galaxy:true },
      { id:'triangulum', name:'三角座星系', en:'Triangulum M33', type:'旋涡星系', scale:3, diameter:'~6万光年', dist:'273万光年', desc:'本星系群第三大星系，仙女座星系的卫星星系。', color:0xccddff, size:4.5, pos:[200,100,-650], galaxy:true },
      { id:'lmc', name:'大麦哲伦云', en:'LMC', type:'不规则矮星系', scale:3, diameter:'~14,000光年', dist:'16.3万光年', desc:'银河系最大的卫星星系，仅南半球可见。1987年在此观测到著名超新星SN 1987A。', color:0xbbccff, size:4, pos:[250,-150,-550], galaxy:true },
      // Scale 4 - Universe
      { id:'virgo-sc', name:'室女座超星系团', en:'Virgo Supercluster', type:'超星系团', scale:4, diameter:'~1.1亿光年', desc:'包含本星系群在内约100个星系群和星系团，是拉尼亚凯亚超星系团的一部分。', color:0x554488, size:20, pos:[0,0,-1200] },
      { id:'laniakea', name:'拉尼亚凯亚超星系团', en:'Laniakea Supercluster', type:'超星系团', scale:4, diameter:'~5.2亿光年', desc:'2014年定义，夏威夷语意为"无尽的天堂"。引力中心为"巨引源"。', color:0x443366, size:30, pos:[0,0,-1500] },
      { id:'cmb', name:'宇宙微波背景', en:'CMB', type:'宇宙辐射', scale:4, temp:'2.725K', dist:'大爆炸后38万年', desc:'大爆炸遗留的热辐射，均匀充满宇宙。1965年发现，为宇宙大爆炸理论提供了最有力证据。', color:0x332244, size:50, pos:[0,0,-2000] },
    ];

    // ---------- State ----------
    let currentScale = 0;
    let selectedId = null;
    let sidebarOpen = false;
    let isImmersive = false;
    let cameraTarget = new THREE.Vector3(0,0,0);
    let cameraGoal = new THREE.Vector3(0,30,60);
    let lookGoal = new THREE.Vector3(0,0,0);
    let animating = false;

    // ---------- Three.js ----------
    log('Initializing Three.js...');
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 10000);
    camera.position.set(0, 30, 60);
    camera.lookAt(0,0,0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.domElement.id = 'three-canvas';
    document.getElementById('app').appendChild(renderer.domElement);
    log('Three.js initialized');

    // Lighting
    scene.add(new THREE.AmbientLight(0x222244, 1.5));
    const sunLight = new THREE.PointLight(0xffffff, 200, 300);
    scene.add(sunLight);

    // Starfield
    const starCount = 4000;
    const starPos = new Float32Array(starCount * 3);
    const starCol = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 800 + Math.random() * 400;
      starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
      starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      starPos[i*3+2] = r * Math.cos(phi);
      const c = Math.random();
      if (c < 0.6) { starCol[i*3]=0.85+Math.random()*0.15; starCol[i*3+1]=0.85+Math.random()*0.15; starCol[i*3+2]=0.9+Math.random()*0.1; }
      else if (c < 0.8) { starCol[i*3]=0.5+Math.random()*0.3; starCol[i*3+1]=0.6+Math.random()*0.3; starCol[i*3+2]=0.9+Math.random()*0.1; }
      else if (c < 0.9) { starCol[i*3]=0.9+Math.random()*0.1; starCol[i*3+1]=0.7+Math.random()*0.2; starCol[i*3+2]=0.4+Math.random()*0.3; }
      else { starCol[i*3]=0.7+Math.random()*0.3; starCol[i*3+1]=0.4+Math.random()*0.3; starCol[i*3+2]=0.3+Math.random()*0.3; }
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size:0.8, vertexColors:true, blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true }));
    stars.name = 'starfield';
    scene.add(stars);
    log('Starfield created');

    // Celestial bodies
    const meshes = new Map();
    bodies.forEach(b => {
      let mesh;
      const s = b.size * 0.4;
      const col = '#' + b.color.toString(16).padStart(6, '0');

      if (b.blackhole) {
        mesh = new THREE.Mesh(new THREE.SphereGeometry(s, 48, 48), new THREE.MeshBasicMaterial({ color:0x000011 }));
        const ringGeo = new THREE.TorusGeometry(s*1.5, s*0.15, 16, 64);
        const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color:0x8844ff, transparent:true, opacity:0.7 }));
        ring.rotation.x = Math.PI/2;
        mesh.add(ring);
        const glowGeo = new THREE.SphereGeometry(s*2, 32, 32);
        const glowMat = new THREE.ShaderMaterial({
          uniforms:{ uColor:{value:new THREE.Color(0x4422aa)} },
          vertexShader:'varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
          fragmentShader:'varying vec3 vN; uniform vec3 uColor; void main(){ float i=pow(0.7-dot(vN,vec3(0,0,1)),3.0); gl_FragColor=vec4(uColor,i*0.5); }',
          transparent:true, depthWrite:false
        });
        mesh.add(new THREE.Mesh(glowGeo, glowMat));
      } else if (b.nebula || b.cluster || b.galaxy) {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const grd = ctx.createRadialGradient(128,128,0,128,128,128);
        grd.addColorStop(0, col);
        grd.addColorStop(0.3, col + 'cc');
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.fillRect(0,0,256,256);
        for (let i=0;i<100;i++) {
          ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.5})`;
          ctx.beginPath();
          ctx.arc(Math.random()*256, Math.random()*256, Math.random()*2, 0, Math.PI*2);
          ctx.fill();
        }
        const tex = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.8 }));
        sprite.scale.set(s*6, s*6, 1);
        mesh = sprite;
      } else {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = col;
        ctx.fillRect(0,0,256,256);
        // Texture detail
        if (b.type?.includes('气态')) {
          for (let y=0;y<256;y++) { ctx.fillStyle=`rgba(255,255,255,${0.03+Math.random()*0.06})`; ctx.fillRect(0,y,256,2+Math.random()*8); }
          for (let i=0;i<6;i++) { const y=256/7*(i+1); ctx.fillStyle=`rgba(255,255,255,${0.1+Math.random()*0.12})`; ctx.fillRect(0,y-3,256,6+Math.random()*12); }
        } else if (b.type?.includes('冰')) {
          for (let y=0;y<256;y++) { ctx.fillStyle=`rgba(255,255,255,${0.02+Math.random()*0.04})`; ctx.fillRect(0,y,256,1); }
        } else {
          for (let i=0;i<30;i++) { ctx.fillStyle=`rgba(0,0,0,${0.04+Math.random()*0.08})`; ctx.beginPath(); ctx.arc(Math.random()*256,Math.random()*256,2+Math.random()*6,0,Math.PI*2); ctx.fill(); }
        }
        const tex = new THREE.CanvasTexture(canvas);
        const isStar = b.type?.includes('恒星') || b.type?.includes('主序星') || b.type?.includes('巨星') || b.type?.includes('矮星') && !b.type?.includes('矮行星');
        const mat = new THREE.MeshStandardMaterial({ map:tex, roughness:isStar?0.2:0.7, metalness:0.1, emissive:isStar?b.color:0, emissiveIntensity:isStar?0.8:0 });
        mesh = new THREE.Mesh(new THREE.SphereGeometry(s, 48, 48), mat);

        // Star glow
        if (isStar) {
          const gGeo = new THREE.SphereGeometry(s*1.4, 32, 32);
          const gMat = new THREE.ShaderMaterial({
            uniforms:{ uColor:{value:new THREE.Color(b.color)} },
            vertexShader:'varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
            fragmentShader:'varying vec3 vN; uniform vec3 uColor; void main(){ float i=pow(0.65-dot(vN,vec3(0,0,1)),3.0); gl_FragColor=vec4(uColor,i*0.6); }',
            transparent:true, depthWrite:false
          });
          mesh.add(new THREE.Mesh(gGeo, gMat));
        }

        // Saturn rings
        if (b.rings) {
          const rGeo = new THREE.TorusGeometry(s*1.6, s*0.15, 16, 80);
          const rMat = new THREE.MeshStandardMaterial({ color:0xeeddbb, roughness:0.6, side:THREE.DoubleSide });
          const r = new THREE.Mesh(rGeo, rMat);
          r.rotation.x = Math.PI/2.4;
          mesh.add(r);
        }
      }

      mesh.position.set(...b.pos);
      mesh.name = b.id;
      mesh.userData = { bodyId:b.id };
      scene.add(mesh);
      meshes.set(b.id, mesh);
    });
    log('Bodies created: ' + meshes.size);

    // Orbits
    bodies.filter(b => b.parent === 'sun').forEach(b => {
      const r = Math.abs(b.pos[0]);
      const pts = [];
      for (let i=0;i<=128;i++) {
        const a = (i/128) * Math.PI * 2;
        pts.push(new THREE.Vector3(Math.cos(a)*r, 0, Math.sin(a)*r));
      }
      const line = new THREE.LineLoop(
        new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color:0x334466, transparent:true, opacity:0.3, depthWrite:false })
      );
      scene.add(line);
    });

    // ---------- Controls ----------
    let dragging = false, prevMouse = {x:0,y:0};
    let spherical = new THREE.Spherical(60, Math.PI/3, 0);
    const pivot = new THREE.Vector3(0,0,0);

    function updateCam() {
      const pos = new THREE.Vector3().setFromSpherical(spherical).add(pivot);
      camera.position.copy(pos);
      camera.lookAt(pivot);
      cameraGoal.copy(pos);
      lookGoal.copy(pivot);
    }

    renderer.domElement.addEventListener('pointerdown', e => { dragging=true; prevMouse={x:e.clientX,y:e.clientY}; });
    window.addEventListener('pointerup', () => dragging=false);
    window.addEventListener('pointermove', e => {
      if (!dragging || isImmersive) return;
      spherical.theta -= (e.clientX-prevMouse.x)*0.005;
      spherical.phi -= (e.clientY-prevMouse.y)*0.005;
      spherical.phi = Math.max(0.1, Math.min(Math.PI/2, spherical.phi));
      prevMouse = {x:e.clientX,y:e.clientY};
      updateCam();
    });
    renderer.domElement.addEventListener('wheel', e => {
      e.preventDefault();
      spherical.radius *= 1 + e.deltaY*0.001;
      spherical.radius = Math.max(5, Math.min(500, spherical.radius));
      updateCam();
      // Auto scale
      const r = spherical.radius;
      let ns = r<40?0 : r<120?1 : r<200?2 : r<350?3 : 4;
      setScale(ns);
    });
    updateCam();

    // Fly to
    function flyTo(id) {
      const b = bodies.find(x=>x.id===id);
      if (!b) return;
      cameraGoal.set(b.pos[0]+8, b.pos[1]+5, b.pos[2]+12);
      lookGoal.set(...b.pos);
      animating = true;
    }
    function flyScale(s) {
      const cfg = {
        0:{p:[0,30,60],l:[0,0,0]}, 1:{p:[0,30,200],l:[0,0,-80]},
        2:{p:[0,30,350],l:[0,0,-200]}, 3:{p:[0,50,700],l:[150,0,-550]},
        4:{p:[0,80,1600],l:[0,0,-1200]}
      };
      const c = cfg[s]||cfg[0];
      cameraGoal.set(...c.p); lookGoal.set(...c.l);
      animating = true;
    }
    function setScale(s) {
      if (s !== currentScale) { currentScale = s; selectedId = null; updateInfoPanel(); updateSidebar(); updateScaleBar(); }
    }

    // ---------- UI ----------
    // Splash
    const splashWrap = document.getElementById('splash-wrap');
    let splashDone = false;

    function dismissSplash() {
      if (splashDone) return;
      splashDone = true;
      splashWrap.style.opacity = '0';
      splashWrap.style.transition = 'opacity 0.6s ease';
      splashWrap.style.pointerEvents = 'none';
      setTimeout(() => splashWrap.style.display = 'none', 600);
    }
    splashWrap.addEventListener('click', dismissSplash);
    document.addEventListener('keydown', dismissSplash);

    // Sidebar
    const sidebar = document.getElementById('sidebar');
    const btnMenu = document.getElementById('btn-menu');
    const searchBox = document.getElementById('search-box');
    const treeEl = document.getElementById('celestial-tree');

    btnMenu.addEventListener('click', () => {
      sidebarOpen = !sidebarOpen;
      sidebar.classList.toggle('open', sidebarOpen);
    });

    searchBox.addEventListener('input', () => updateSidebar(searchBox.value));

    function updateSidebar(q) {
      treeEl.innerHTML = '';
      const results = q ? bodies.filter(b => b.name.includes(q) || b.en.toLowerCase().includes(q.toLowerCase())) : null;
      if (results) {
        if (results.length===0) treeEl.innerHTML = '<div class="tree-cat">未找到</div>';
        else results.forEach(b => treeEl.appendChild(makeNode(b)));
        return;
      }
      SCALES.forEach(s => {
        const cat = document.createElement('div');
        cat.className = 'tree-cat';
        cat.textContent = s.icon + ' ' + s.name;
        treeEl.appendChild(cat);
        bodies.filter(b => b.scale===s.id && !b.parent).forEach(b => {
          treeEl.appendChild(makeNode(b));
          bodies.filter(c => c.parent===b.id).forEach(c => {
            const n = makeNode(c);
            n.classList.add('child');
            treeEl.appendChild(n);
          });
        });
      });
    }

    function makeNode(b) {
      const d = document.createElement('div');
      d.className = 'tree-node';
      d.textContent = b.name + ' (' + b.en + ')';
      if (b.id===selectedId) d.classList.add('sel');
      d.addEventListener('click', () => {
        selectedId = b.id;
        sidebarOpen = false;
        sidebar.classList.remove('open');
        updateSidebar(searchBox.value);
        updateInfoPanel();
        flyTo(b.id);
      });
      return d;
    }

    // Info Panel
    const infoPanel = document.getElementById('info-panel');
    document.getElementById('btn-close-info').addEventListener('click', () => {
      selectedId = null;
      updateInfoPanel();
      updateSidebar();
    });

    function updateInfoPanel() {
      const b = bodies.find(x=>x.id===selectedId);
      if (!b) { infoPanel.classList.remove('show'); return; }
      infoPanel.querySelector('.body-name').textContent = b.name;
      infoPanel.querySelector('.en').textContent = b.en;
      const rows = infoPanel.querySelector('.rows');
      rows.innerHTML = '';
      const fields = [['类型',b.type],['直径',b.diameter],['质量',b.mass],['温度',b.temp],['距离',b.dist]];
      fields.forEach(([l,v]) => {
        if (v) {
          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML = `<span class="lbl">${l}</span><span>${v}</span>`;
          rows.appendChild(row);
        }
      });
      infoPanel.querySelector('.desc').textContent = b.desc;
      document.getElementById('btn-immersive').style.display = b.immersive ? 'block' : 'none';
      infoPanel.classList.add('show');
    }

    // Immersive
    document.getElementById('btn-immersive').addEventListener('click', () => {
      if (!selectedId || isImmersive) return;
      isImmersive = true;
      const b = bodies.find(x=>x.id===selectedId);
      const mesh = meshes.get(selectedId);
      if (mesh && b) {
        const p = mesh.position;
        camera.position.set(p.x+b.size*1.2, p.y+b.size*0.6, p.z+b.size*1.5);
        camera.lookAt(p);
        cameraGoal.copy(camera.position);
        lookGoal.copy(p);
      }
      const imm = document.getElementById('imm-overlay');
      imm.appendChild(renderer.domElement);
      imm.classList.add('act');
      const hint = document.getElementById('imm-hint');
      hint.textContent = b?.immersive ? '3D沉浸模式 · 拖拽旋转 · ESC退出' : '该天体3D视频资源暂不可用 · 增强3D视图';
      hint.classList.add('show');
      setTimeout(() => hint.classList.remove('show'), 4000);
    });

    document.getElementById('btn-exit-imm').addEventListener('click', exitImm);
    document.addEventListener('keydown', e => { if (e.key==='Escape' && isImmersive) exitImm(); });

    function exitImm() {
      isImmersive = false;
      const app = document.getElementById('app');
      app.appendChild(renderer.domElement);
      document.getElementById('imm-overlay').classList.remove('act');
      document.getElementById('imm-hint').classList.remove('show');
    }

    // Scale bar
    const scaleBar = document.getElementById('scale-bar');
    SCALES.forEach(s => {
      const item = document.createElement('div');
      item.className = 'scale-item';
      item.dataset.s = s.id;
      item.innerHTML = `<span class="scale-icon">${s.icon}</span><span>${s.name}</span>`;
      item.addEventListener('click', () => { setScale(s.id); flyScale(s.id); });
      scaleBar.appendChild(item);
    });
    function updateScaleBar() {
      scaleBar.querySelectorAll('.scale-item').forEach(el => el.classList.toggle('act', +el.dataset.s===currentScale));
    }

    // Init
    updateSidebar();
    updateScaleBar();
    scaleBar.querySelector('[data-s="0"]')?.classList.add('act');

    // ---------- Render loop ----------
    const clock = new THREE.Clock();

    function render() {
      requestAnimationFrame(render);

      const dt = clock.getDelta();

      if (animating) {
        camera.position.lerp(cameraGoal, 0.05);
        camera.lookAt(lookGoal);
        if (camera.position.distanceTo(cameraGoal) < 0.5) {
          camera.position.copy(cameraGoal);
          animating = false;
        }
      }

      // Rotate starfield slowly
      stars.rotation.y += 0.0001;

      // Rotate selected body in immersive mode
      if (isImmersive && selectedId) {
        const m = meshes.get(selectedId);
        if (m) m.rotation.y += 0.005;
      }

      renderer.render(scene, camera);
    }

    log('Starting render loop');
    render();
    log('All initialized successfully!');
  </script>
</body>
</html>

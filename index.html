  const bg1=new THREE.Group();bg1.name='bg-scale1';bg1.userData={isBackground:true,scale:1};
  const nc=[0x663344,0x334466,0x664433,0x443366,0x335544,0x553344,0x334455,0x554433];
  for(let i=0;i<10;i++){const c=document.createElement('canvas');c.width=256;c.height=256;const ctx=c.getContext('2d');const cl='#'+nc[i].toString(16).padStart(6,'0');const grd=ctx.createRadialGradient(128,128,10+Math.random()*30,128,128,128);grd.addColorStop(0,cl+'aa');grd.addColorStop(.3,cl+'55');grd.addColorStop(.6,cl+'11');grd.addColorStop(1,'transparent');ctx.fillStyle=grd;ctx.fillRect(0,0,256,256);const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.2+Math.random()*.15}));sp.position.set((Math.random()-.5)*600,(Math.random()-.5)*400,(Math.random()-.5)*600);sp.scale.set(80+Math.random()*140,80+Math.random()*140,1);bg1.add(sp)}
  scene.add(bg1);scaleBGs[1]=bg1;
  // Scale 2: spiral dust
  const bg2=new THREE.Group();bg2.name='bg-scale2';bg2.userData={isBackground:true,scale:2};
  const dc=5000,dg=new THREE.BufferGeometry(),dp=new Float32Array(dc*3),dcl=new Float32Array(dc*3);
  for(let i=0;i<dc;i++){const a=Math.random()*Math.PI*2,r=80+Math.random()*140,sa=a+r*.03;dp[i*3]=Math.cos(sa)*r;dp[i*3+1]=(Math.random()-.5)*15;dp[i*3+2]=Math.sin(sa)*r;const cl=.3+Math.random()*.15;dcl[i*3]=cl+.05;dcl[i*3+1]=cl;dcl[i*3+2]=cl+.1}
  dg.setAttribute('position',new THREE.BufferAttribute(dp,3));dg.setAttribute('color',new THREE.BufferAttribute(dcl,3));bg2.add(new THREE.Points(dg,new THREE.PointsMaterial({size:.5,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.45})));
  scene.add(bg2);scaleBGs[2]=bg2;
  // Scale 3: intergalactic
  const bg3=new THREE.Group();bg3.name='bg-scale3';bg3.userData={isBackground:true,scale:3};
  const ic=4000,ig=new THREE.BufferGeometry(),ip=new Float32Array(ic*3);
  for(let i=0;i<ic;i++){ip[i*3]=(Math.random()-.5)*1200;ip[i*3+1]=(Math.random()-.5)*800;ip[i*3+2]=(Math.random()-.5)*1200}
  ig.setAttribute('position',new THREE.BufferAttribute(ip,3));bg3.add(new THREE.Points(ig,new THREE.PointsMaterial({size:.5,color:0x334455,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.35})));
  for(let i=0;i<30;i++){const c=document.createElement('canvas');c.width=64;c.height=64;const ctx=c.getContext('2d');const grd=ctx.createRadialGradient(32,32,0,32,32,32);grd.addColorStop(0,'#ccddee88');grd.addColorStop(.5,'#ccddee22');grd.addColorStop(1,'transparent');ctx.fillStyle=grd;ctx.fillRect(0,0,64,64);const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.5}));sp.position.set((Math.random()-.5)*1200,(Math.random()-.5)*800,(Math.random()-.5)*1200);sp.scale.set(30+Math.random()*60,30+Math.random()*60,1);bg3.add(sp)}
  scene.add(bg3);scaleBGs[3]=bg3;
  // Scale 4: cosmic web
  const bg4=new THREE.Group();bg4.name='bg-scale4';bg4.userData={isBackground:true,scale:4};
  for(let s=0;s<10;s++){const sc=800,sg=new THREE.BufferGeometry(),sp2=new Float32Array(sc*3);const sx2=(Math.random()-.5)*2000,sy2=(Math.random()-.5)*2000,sz2=(Math.random()-.5)*2000,dx=(Math.random()-.5)*2,dy=(Math.random()-.5)*2,dz=(Math.random()-.5)*2;for(let i=0;i<sc;i++){const t=i/sc;sp2[i*3]=sx2+dx*600*t+(Math.random()-.5)*80;sp2[i*3+1]=sy2+dy*600*t+(Math.random()-.5)*80;sp2[i*3+2]=sz2+dz*600*t+(Math.random()-.5)*80}sg.setAttribute('position',new THREE.BufferAttribute(sp2,3));bg4.add(new THREE.Points(sg,new THREE.PointsMaterial({size:.7,color:0x332244,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.3})))}
  bg4.add(new THREE.Mesh(new THREE.SphereGeometry(2500,64,32),new THREE.MeshBasicMaterial({color:0x111122,side:THREE.BackSide,transparent:true,opacity:.25,depthWrite:false})));
  scene.add(bg4);scaleBGs[4]=bg4;
  log('Scale BGs created');
}catch(e){log('Scale BG fail: '+e.message)}

// ═══════════ CAMERA ═══════════
function updateCam(){const pos=new THREE.Vector3().setFromSpherical(spherical).add(pivot);camera.position.copy(pos);camera.lookAt(pivot);cameraGoal.copy(pos);lookGoal.copy(pivot)}
updateCam();
function setPivot(np){const off=camera.position.clone().sub(np);spherical.setFromVector3(off);pivot.copy(np);updateCam()}
renderer.domElement.addEventListener('pointerdown',e=>{dragging=true;dragMoved=false;prevMouse={x:e.clientX,y:e.clientY}});
window.addEventListener('pointerup',()=>dragging=false);
window.addEventListener('pointermove',e=>{if(!dragging||isImmersive)return;const dx=e.clientX-prevMouse.x,dy=e.clientY-prevMouse.y;if(Math.abs(dx)>1||Math.abs(dy)>1)dragMoved=true;spherical.theta-=dx*.005;spherical.phi-=dy*.005;spherical.phi=Math.max(.05,Math.min(Math.PI*.49,spherical.phi));prevMouse={x:e.clientX,y:e.clientY};updateCam()});
renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();spherical.radius*=1+e.deltaY*.001;spherical.radius=Math.max(3,Math.min(800,spherical.radius));updateCam();const r=spherical.radius;let ns=r<40?0:r<150?1:r<300?2:r<500?3:4;if(ns!==currentScale)setScale(ns)},{passive:false});

// ═══════════ RAYCASTER ═══════════
const raycaster=new THREE.Raycaster();raycaster.params.Points.threshold=1.5;
renderer.domElement.addEventListener('click',e=>{if(dragMoved||isImmersive)return;const mouse=new THREE.Vector2((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);raycaster.setFromCamera(mouse,camera);const hits=raycaster.intersectObjects(selectable,true);if(hits.length>0){let obj=hits[0].object;while(obj&&!obj.userData.bodyId)obj=obj.parent;if(obj&&obj.userData.bodyId&&obj.userData.bodyId!==selectedId)selectBody(obj.userData.bodyId)}});

// ═══════════ SELECTION ═══════════
function selectBody(id){
  const b=bodies.find(x=>x.id===id);if(!b)return;
  selectedId=id;
  setPivot(new THREE.Vector3(...b.pos));
  if(b.scale!==currentScale){currentScale=b.scale;updateScaleBar()}
  if(activeBodyBG){activeBodyBG.visible=false;activeBodyBG.children.forEach(c=>{if(c.material&&c.material.transparent)c.material.opacity=0})}
  const bg=bodyBGs.get(id);
  if(bg){bg.visible=true;bg.children.forEach(c=>{if(c.material&&c.material.transparent)c.material.opacity=c.material.userData?.baseOpacity||.5});activeBodyBG=bg}
  updateInfoPanel();updateSidebar();
  const fi=$('focus-indicator');fi.textContent='🔭 当前聚焦: '+b.name+' ('+b.en+')';fi.classList.add('show');setTimeout(()=>fi.classList.remove('show'),3000);
}
function deselectBody(){
  if(activeBodyBG){activeBodyBG.visible=false;activeBodyBG=null}
  selectedId=null;updateInfoPanel();updateSidebar();
}
function setScale(s){if(s===currentScale)return;currentScale=s;if(selectedId){const b=bodies.find(x=>x.id===selectedId);if(b&&b.scale!==s)deselectBody()}updateScaleBar();updateSidebar()}
function flyScale(s){const cfg={0:{p:[0,30,60],l:[0,0,0]},1:{p:[0,30,200],l:[0,0,-80]},2:{p:[0,30,350],l:[0,0,-200]},3:{p:[0,50,700],l:[150,0,-550]},4:{p:[0,80,1600],l:[0,0,-1200]}};const c=cfg[s]||cfg[0];pivot.set(...c.l);const off=new THREE.Vector3(...c.p).sub(pivot);spherical.setFromVector3(off);updateCam()}

// ═══════════ UI ═══════════
const splashWrap=$('splash-wrap');let splashDone=false;
function dismissSplash(){if(splashDone)return;splashDone=true;splashWrap.style.opacity='0';splashWrap.style.transition='opacity .6s';splashWrap.style.pointerEvents='none';setTimeout(()=>splashWrap.style.display='none',600)}
splashWrap.addEventListener('click',dismissSplash);document.addEventListener('keydown',dismissSplash);
const sidebar=$('sidebar'),btnMenu=$('btn-menu'),searchBox=$('search-box'),treeEl=$('celestial-tree');
btnMenu.addEventListener('click',()=>{sidebarOpen=!sidebarOpen;sidebar.classList.toggle('open',sidebarOpen)});
searchBox.addEventListener('input',()=>updateSidebar(searchBox.value));
function updateSidebar(q){treeEl.innerHTML='';const results=q?bodies.filter(b=>b.name.includes(q)||b.en.toLowerCase().includes(q.toLowerCase())):null;if(results){if(!results.length)treeEl.innerHTML='<div class="tree-cat">未找到</div>';else results.forEach(b=>treeEl.appendChild(makeNode(b)));return}SCALES.forEach(s=>{const cat=document.createElement('div');cat.className='tree-cat';cat.textContent=s.icon+' '+s.name;treeEl.appendChild(cat);bodies.filter(b=>b.scale===s.id&&!b.parent).forEach(b=>{treeEl.appendChild(makeNode(b));bodies.filter(c=>c.parent===b.id).forEach(c=>{const n=makeNode(c);n.classList.add('child');treeEl.appendChild(n)})})})}
function makeNode(b){const d=document.createElement('div');d.className='tree-node';d.textContent=b.name+' ('+b.en+')';if(b.id===selectedId)d.classList.add('sel');d.addEventListener('click',()=>{selectBody(b.id);sidebarOpen=false;sidebar.classList.remove('open');updateSidebar(searchBox.value)});return d}
const infoPanel=$('info-panel');$('btn-close-info').addEventListener('click',()=>deselectBody());
function updateInfoPanel(){const b=bodies.find(x=>x.id===selectedId);if(!b){infoPanel.classList.remove('show');return}infoPanel.querySelector('.body-name').textContent=b.name;infoPanel.querySelector('.en').textContent=b.en;const rows=infoPanel.querySelector('.rows');rows.innerHTML='';[['类型',b.type],['直径',b.dia],['质量',b.mass],['温度',b.temp],['距离',b.dist]].forEach(([l,v])=>{if(v){const r=document.createElement('div');r.className='row';r.innerHTML='<span class="lbl">'+l+'</span><span>'+v+'</span>';rows.appendChild(r)}});infoPanel.querySelector('.desc').textContent=b.desc;$('btn-immersive').style.display=b.imm?'block':'none';infoPanel.classList.add('show')}
$('btn-immersive').addEventListener('click',()=>{if(!selectedId||isImmersive)return;isImmersive=true;const b=bodies.find(x=>x.id===selectedId),mesh=meshes.get(selectedId);if(mesh&&b){const p=mesh.position;camera.position.set(p.x+b.size*1.2,p.y+b.size*.6,p.z+b.size*1.5);camera.lookAt(p)}$('imm-overlay').appendChild(renderer.domElement);$('imm-overlay').classList.add('act');const hint=$('imm-hint');hint.textContent=b?.imm?'3D沉浸模式 · 拖拽旋转 · ESC键退出':'该天体3D视频资源暂不可用 · 增强3D视图';hint.classList.add('show');setTimeout(()=>hint.classList.remove('show'),4000)});
$('btn-exit-imm').addEventListener('click',exitImm);
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&isImmersive)exitImm()});
function exitImm(){isImmersive=false;$('app').appendChild(renderer.domElement);$('imm-overlay').classList.remove('act');$('imm-hint').classList.remove('show')}
const scaleBar=$('scale-bar');
SCALES.forEach(s=>{const item=document.createElement('div');item.className='scale-item';item.dataset.s=s.id;item.innerHTML='<span class="scale-icon">'+s.icon+'</span><span>'+s.name+'</span>';item.addEventListener('click',()=>{setScale(s.id);flyScale(s.id)});scaleBar.appendChild(item)});
function updateScaleBar(){scaleBar.querySelectorAll('.scale-item').forEach(el=>el.classList.toggle('act',+el.dataset.s===currentScale))}
updateSidebar();updateScaleBar();scaleBar.querySelector('[data-s="0"]')?.classList.add('act');

// ═══════════ RENDER ═══════════
const clock=new THREE.Clock();
let frameCount=0;
function render(){
  requestAnimationFrame(render);
  frameCount++;
  try{
    const dt=Math.min(clock.getDelta(),.1);
    if(camera.position.distanceTo(cameraGoal)>.1){camera.position.lerp(cameraGoal,.08);camera.lookAt(lookGoal)}
    stars.rotation.y+=.00006;stars.rotation.x+=.00003;
    const sm=meshes.get('sun');if(sm)sm.rotation.y+=.0015;
    meshes.forEach((m,id)=>{const b=bodies.find(x=>x.id===id);if(!b||b.tag==='neb'||b.tag==='clust')return;if(id==='sun')return;if(b.tag==='star')m.rotation.y+=.0003;else if(b.tag!=='gal'&&b.tag!=='bh')m.rotation.y+=.002});
    // Black hole pulse
    bodies.filter(b=>b.tag==='bh').forEach(b=>{const m=meshes.get(b.id);if(m)m.children.forEach(c=>{if(c.material&&c.material.uniforms&&c.material.uniforms.uT)c.material.uniforms.uT.value+=dt})});
    if(activeBodyBG&&activeBodyBG.visible)activeBodyBG.rotation.y+=.002;
    Object.values(scaleBGs).forEach(bg=>{if(bg&&bg.visible)bg.rotation.y+=.0001});
    if(isImmersive&&selectedId){const m=meshes.get(selectedId);if(m)m.rotation.y+=.004}
    sunLight.position.copy(camera.position);
    renderer.render(scene,camera);
    if(frameCount===1)log('First frame rendered OK!');
  }catch(e){log('Render err: '+e.message)}
}
log('Starting render loop...');
render();
log('Init complete. Click splash to begin.');
</script>
</body>
</html>
